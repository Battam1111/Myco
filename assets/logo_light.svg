<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Myco logo — light mode (transparent background, #00875E accent) -->

  <!-- Filament A: upper-right (longest, with branch) -->
  <line x1="50" y1="50" x2="82" y2="22" stroke="#00875E" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>
  <circle cx="82" cy="22" r="4" fill="#00875E" opacity="0.9"/>
  <!-- Branch A1 -->
  <line x1="68" y1="34" x2="88" y2="16" stroke="#00875E" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <circle cx="88" cy="16" r="2.5" fill="#00875E" opacity="0.55"/>

  <!-- Filament B: lower-right -->
  <line x1="50" y1="50" x2="78" y2="80" stroke="#00875E" stroke-width="2.0" stroke-linecap="round" opacity="0.75"/>
  <circle cx="78" cy="80" r="3.5" fill="#00875E" opacity="0.8"/>

  <!-- Filament C: left -->
  <line x1="50" y1="50" x2="16" y2="44" stroke="#00875E" stroke-width="2.0" stroke-linecap="round" opacity="0.7"/>
  <circle cx="16" cy="44" r="3" fill="#00875E" opacity="0.75"/>

  <!-- Central node — core (no glow on light background) -->
  <circle cx="50" cy="50" r="7" fill="#00875E" opacity="0.9"/>
  <circle cx="50" cy="50" r="3.5" fill="#FFFFFF" opacity="0.95"/>
</svg>
