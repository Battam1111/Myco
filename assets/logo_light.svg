<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#FFFFFF" rx="12"/>
  
  <!-- Outer filaments (organic, non-symmetric angles) -->
  <g stroke="#007A63" stroke-linecap="round">
    <!-- filament 1 → upper-right -->
    <line x1="50" y1="50" x2="78" y2="24" stroke-width="1.2" stroke-opacity="0.7"/>
    <circle cx="78" cy="24" r="2.5" fill="#007A63" opacity="0.8"/>
    
    <!-- filament 2 → right -->
    <line x1="50" y1="50" x2="85" y2="52" stroke-width="1.2" stroke-opacity="0.6"/>
    <circle cx="85" cy="52" r="2" fill="#007A63" opacity="0.65"/>
    
    <!-- filament 3 → lower-right -->
    <line x1="50" y1="50" x2="72" y2="78" stroke-width="1.0" stroke-opacity="0.55"/>
    <circle cx="72" cy="78" r="1.8" fill="#007A63" opacity="0.55"/>
    
    <!-- filament 4 → lower-left -->
    <line x1="50" y1="50" x2="26" y2="74" stroke-width="1.0" stroke-opacity="0.5"/>
    <circle cx="26" cy="74" r="1.5" fill="#007A63" opacity="0.5"/>
    
    <!-- filament 5 → left -->
    <line x1="50" y1="50" x2="18" y2="46" stroke-width="1.2" stroke-opacity="0.6"/>
    <circle cx="18" cy="46" r="2" fill="#007A63" opacity="0.65"/>
    
    <!-- filament 6 → upper-left -->
    <line x1="50" y1="50" x2="28" y2="22" stroke-width="1.2" stroke-opacity="0.7"/>
    <circle cx="28" cy="22" r="2.2" fill="#007A63" opacity="0.75"/>
    
    <!-- secondary branches -->
    <line x1="78" y1="24" x2="90" y2="14" stroke-width="0.8" stroke-opacity="0.4"/>
    <circle cx="90" cy="14" r="1.2" fill="#007A63" opacity="0.4"/>
    
    <line x1="28" y1="22" x2="16" y2="12" stroke-width="0.8" stroke-opacity="0.35"/>
    <circle cx="16" cy="12" r="1.2" fill="#007A63" opacity="0.35"/>
    
    <line x1="85" y1="52" x2="94" y2="68" stroke-width="0.7" stroke-opacity="0.3"/>
    <circle cx="94" cy="68" r="1" fill="#007A63" opacity="0.3"/>
  </g>
  
  <!-- Central node — glow layers -->
  <circle cx="50" cy="50" r="14" fill="#007A63" opacity="0.06"/>
  <circle cx="50" cy="50" r="9"  fill="#007A63" opacity="0.12"/>
  <circle cx="50" cy="50" r="5.5" fill="#007A63" opacity="1.0"/>
  <circle cx="50" cy="50" r="3"  fill="#FFFFFF"  opacity="0.95"/>
</svg>