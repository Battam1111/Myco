<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Myco Logo v6 — Organic Mycelium: dense branching growth from luminous core -->
  <!-- NOT a network diagram. An ORGANISM. -->

  <defs>
    <!-- Central glow gradient -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5B0" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#00E5B0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00E5B0" stop-opacity="0"/>
    </radialGradient>
    <!-- Tip glow -->
    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5B0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00E5B0" stop-opacity="0"/>
    </radialGradient>
    <!-- Ambient -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5B0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00E5B0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient field -->
  <circle cx="248" cy="258" r="220" fill="url(#ambient)"/>

  <!-- === PRIMARY HYPHAE (thick, bright — main growth directions) === -->
  <g fill="none" stroke="#00E5B0" stroke-linecap="round">

    <!-- Hypha 1: upper-right dominant arm (spiral curve) -->
    <path d="M 248 258 C 280 230, 320 210, 370 195 C 390 188, 415 192, 430 205"
          stroke-width="4" opacity="0.9"/>
    <!-- fork from hypha 1 -->
    <path d="M 370 195 C 378 175, 385 150, 380 125"
          stroke-width="2.5" opacity="0.65"/>
    <path d="M 380 125 C 375 110, 388 95, 400 85"
          stroke-width="1.2" opacity="0.35"/>
    <path d="M 380 125 C 370 108, 355 100, 340 92"
          stroke-width="1" opacity="0.28"/>
    <!-- fork from dominant tip -->
    <path d="M 430 205 C 445 212, 460 205, 470 195"
          stroke-width="1.8" opacity="0.5"/>
    <path d="M 430 205 C 440 218, 448 235, 455 248"
          stroke-width="1.5" opacity="0.4"/>

    <!-- Hypha 2: downward-right -->
    <path d="M 248 258 C 268 290, 295 330, 330 370"
          stroke-width="3.5" opacity="0.8"/>
    <path d="M 330 370 C 340 385, 355 395, 372 400"
          stroke-width="2" opacity="0.5"/>
    <path d="M 330 370 C 325 388, 315 405, 308 420"
          stroke-width="1.5" opacity="0.4"/>
    <path d="M 308 420 C 300 432, 295 445, 298 458"
          stroke-width="0.8" opacity="0.22"/>
    <!-- side branch -->
    <path d="M 295 335 C 315 340, 338 345, 358 338"
          stroke-width="1.3" opacity="0.32"/>

    <!-- Hypha 3: left -->
    <path d="M 248 258 C 215 262, 170 255, 125 240"
          stroke-width="3.2" opacity="0.72"/>
    <path d="M 125 240 C 105 233, 85 228, 68 235"
          stroke-width="1.8" opacity="0.45"/>
    <path d="M 125 240 C 118 222, 108 200, 95 185"
          stroke-width="1.5" opacity="0.38"/>
    <path d="M 95 185 C 85 172, 70 168, 55 170"
          stroke-width="0.8" opacity="0.2"/>
    <!-- sub-branch -->
    <path d="M 170 256 C 162 275, 148 295, 130 308"
          stroke-width="1.2" opacity="0.3"/>
    <path d="M 130 308 C 118 318, 105 322, 90 320"
          stroke-width="0.7" opacity="0.18"/>

    <!-- Hypha 4: upper-left -->
    <path d="M 248 258 C 228 235, 198 205, 165 178"
          stroke-width="2.8" opacity="0.62"/>
    <path d="M 165 178 C 148 162, 128 152, 108 148"
          stroke-width="1.6" opacity="0.4"/>
    <path d="M 165 178 C 158 160, 155 138, 148 118"
          stroke-width="1.2" opacity="0.32"/>
    <path d="M 148 118 C 142 100, 130 88, 115 82"
          stroke-width="0.7" opacity="0.18"/>

    <!-- Hypha 5: lower-left -->
    <path d="M 248 258 C 228 285, 195 318, 158 348"
          stroke-width="2.2" opacity="0.52"/>
    <path d="M 158 348 C 140 362, 118 370, 95 372"
          stroke-width="1.3" opacity="0.32"/>
    <path d="M 158 348 C 152 368, 150 388, 155 408"
          stroke-width="1" opacity="0.25"/>

    <!-- Hypha 6: subtle right-side reach -->
    <path d="M 248 258 C 278 255, 320 248, 360 258"
          stroke-width="1.8" opacity="0.42"/>
    <path d="M 360 258 C 380 262, 398 272, 412 285"
          stroke-width="1.2" opacity="0.3"/>
  </g>

  <!-- === TERMINAL NODES (dots at branch tips — varying size = varying maturity) === -->
  <g fill="#00E5B0">
    <!-- Primary tips -->
    <circle cx="430" cy="205" r="7" opacity="0.9"/>
    <circle cx="330" cy="370" r="5.5" opacity="0.8"/>
    <circle cx="125" cy="240" r="5" opacity="0.72"/>
    <circle cx="165" cy="178" r="4.5" opacity="0.62"/>
    <circle cx="158" cy="348" r="3.8" opacity="0.52"/>
    <!-- Secondary tips -->
    <circle cx="380" cy="125" r="3.5" opacity="0.55"/>
    <circle cx="470" cy="195" r="3" opacity="0.45"/>
    <circle cx="455" cy="248" r="2.8" opacity="0.38"/>
    <circle cx="372" cy="400" r="3.2" opacity="0.48"/>
    <circle cx="308" cy="420" r="2.5" opacity="0.35"/>
    <circle cx="68" cy="235" r="3" opacity="0.42"/>
    <circle cx="95" cy="185" r="2.8" opacity="0.35"/>
    <circle cx="108" cy="148" r="2.5" opacity="0.38"/>
    <circle cx="130" cy="308" r="2.2" opacity="0.28"/>
    <!-- Tertiary tips (whisper-faint) -->
    <circle cx="400" cy="85" r="2" opacity="0.3"/>
    <circle cx="340" cy="92" r="1.8" opacity="0.25"/>
    <circle cx="298" cy="458" r="1.5" opacity="0.2"/>
    <circle cx="55" cy="170" r="1.5" opacity="0.18"/>
    <circle cx="115" cy="82" r="1.5" opacity="0.16"/>
    <circle cx="90" cy="320" r="1.5" opacity="0.16"/>
    <circle cx="95" cy="372" r="2" opacity="0.28"/>
    <circle cx="155" cy="408" r="1.8" opacity="0.22"/>
    <circle cx="358" cy="338" r="2" opacity="0.28"/>
    <circle cx="412" cy="285" r="2" opacity="0.28"/>
    <!-- Floating spores (being consumed — approaching the organism) -->
    <circle cx="480" cy="130" r="1.2" opacity="0.1"/>
    <circle cx="48" cy="280" r="1" opacity="0.08"/>
    <circle cx="460" cy="330" r="1" opacity="0.08"/>
    <circle cx="70" cy="430" r="0.8" opacity="0.06"/>
    <circle cx="440" cy="440" r="0.8" opacity="0.06"/>
  </g>

  <!-- === GLOW at dominant tip (just consumed — brightest node) === -->
  <circle cx="430" cy="205" r="20" fill="url(#tipGlow)"/>

  <!-- === CENTRAL CORE: Open arc + luminous center === -->
  <!-- Core glow -->
  <circle cx="248" cy="258" r="35" fill="url(#coreGlow)"/>

  <!-- Open ring (gap faces upper-right — the direction of consumption) -->
  <path d="M 262 244 A 18 18 0 1 0 258 240"
        fill="none" stroke="#00E5B0" stroke-width="3.5" stroke-linecap="round" opacity="0.92"/>

  <!-- White hot center -->
  <circle cx="248" cy="258" r="5" fill="white" opacity="0.95"/>
  <circle cx="248" cy="258" r="8" fill="white" opacity="0.15"/>
</svg>
