# Myco Adapter: MemPalace
# ============================================================
# Bridges MemPalace's retrieval backend into Myco's L0 Archive layer.
# Unlike content-import adapters (Hermes, OpenClaw), this adapter is
# a deployment integration, not a knowledge migration.
#
# The key transformation:
#   MemPalace answers: "retrieve the most relevant facts" (semantic search)
#   Myco answers:      "are those facts still true?" (consistency + evolution)
#
# Together: MemPalace stores the haystack. Myco knows which needles are rusty.
#
# Version: 0.1 | Status: Design spec (not yet implemented)

name: "MemPalace"
version: "0.1"
description: |
  Use MemPalace as Myco's L0 Archive retrieval backend.
  MemPalace provides semantic vector search over large knowledge stores;
  Myco provides the evolution layer (lint, Gear 2 flagging, Gear 3 restructuring)
  that keeps those stores accurate and structured.

source_type: "retrieval_service"    # Local/remote vector store with semantic search API
integration_type: "L0_backend"      # NOT content_import — this is a service deployment
target_layer: "L0_archive"          # MemPalace becomes Myco's long-term retrieval substrate

# ── Architecture (What This Adapter Wires Together) ──────────
architecture: |
  Standard Myco (without MemPalace):
    L1 MYCO.md → L1.5 wiki/*.md → L2 docs/*.md → L3 src/ → [no L0 retrieval]

  Myco + MemPalace:
    L1 MYCO.md → L1.5 wiki/*.md → L2 docs/*.md → L3 src/ → L0 MemPalace backend
                                                              ↑
                                            Semantic search over archived sessions,
                                            old docs, external knowledge ingested
                                            from other tools (Hermes, OpenClaw, etc.)

  The division of labor:
    Myco handles:     structural knowledge (L1-L3), lint, evolution engine (Gear 1-4)
    MemPalace handles: unstructured retrieval (L0), semantic search, large-scale storage

# ── Deployment Steps (v0.x Design Spec) ──────────────────────
import_steps:
  1: "Install and start MemPalace local service (see MemPalace docs for setup)"
  2: "Add [mempalace] section to your project's _canon.yaml: endpoint, collection_name, version"
  3: "Ingest your project's L0 Archive sources into MemPalace: old logs, archived docs, session transcripts"
  4: "Add retrieval hook to your agent prompt: 'For deep-archive queries, search MemPalace collection {collection_name} before answering'"
  5: "Run: myco lint --project-dir . — verify _canon.yaml MemPalace section is well-formed"
  6: "First retrieval test: ask your agent something that requires old archived knowledge — confirm MemPalace is consulted"

# ── Config Schema (what _canon.yaml gains) ────────────────────
canon_extension:
  mempalace:
    endpoint: "http://localhost:8765"   # MemPalace service URL
    collection_name: "string"           # Namespaced per project (e.g. "myco-project-alpha")
    version: "0.x"                      # MemPalace version for compatibility tracking
    ingest_sources:                     # What goes into MemPalace (vs. what stays in Myco's L1-L3)
      - "log.md (entries older than 90 days)"
      - "docs/current/ (lifecycle=[COMPILED] entries)"
      - "external tool imports (Hermes sessions, OpenClaw daily notes)"

# ── Division of Responsibility ────────────────────────────────
layer_mapping:
  "MemPalace collection":              "L0 Archive (unstructured, large-scale retrieval)"
  "Myco wiki/*.md":                    "L1.5 (structured, typed, lint-verified)"
  "Myco docs/*.md":                    "L2 (procedural, decision records, verified)"
  "MemPalace → Myco promotion path":   "When a MemPalace result recurs 3+ times → promote to wiki/ page"

# ── Lint Checks After Integration ─────────────────────────────
lint_checks:
  - "_canon.yaml has [mempalace] section with endpoint, collection_name, and version"
  - "MemPalace endpoint is reachable (network check, optional)"
  - "Collection name matches project slug in _canon.yaml project_name"
  - "No L1/L2 content has been bulk-dumped into MemPalace (that's the wrong direction)"

# ── The Promotion Loop ────────────────────────────────────────
promotion_loop: |
  MemPalace is for retrieval. Myco is for knowledge. When a MemPalace result proves
  repeatedly valuable, it should be promoted into Myco's structured layers:

  MemPalace retrieval result recurs 3+ times
    → Agent writes wiki/{topic}.md (W8 header: type=concept|entity|operations, date=today)
    → Add W8 Back-to footer pointing to MYCO.md
    → Update _canon.yaml wiki_pages count
    → Add log entry: [date] milestone | Promoted "{topic}" from MemPalace archive to wiki/

  This prevents wiki/ from growing stale (Myco lint catches broken links)
  while keeping L0 retrieval as the flexible, unstructured layer it's meant to be.

# ── What You Get ─────────────────────────────────────────────
value_proposition: |
  MemPalace alone: great retrieval, no consistency layer.
  Facts retrieved may be outdated, contradicted, or structurally disconnected.

  Myco alone: structured, consistent, but L0 retrieval requires manual search.
  Fine for most projects; limits scale at 200+ wiki pages.

  MemPalace + Myco:
    - L0: Semantic search over everything (MemPalace)
    - L1-L3: Structured, lint-verified, evolution-tracked knowledge (Myco)
    - Promotion loop: frequently-retrieved facts graduate into Myco's structured layers
    - Gear 2 can flag: "This wiki page was promoted 6 months ago — is MemPalace still
      returning consistent information on this topic?"

  Recommended for: projects with >200 wiki pages, or projects that ingest large
  external knowledge bases (documentation, codebases, research corpora).

# ── Roadmap ──────────────────────────────────────────────────
roadmap:
  v1_0: "myco config --set mempalace.endpoint http://localhost:8765 → write _canon.yaml section; myco ingest --source log.md --backend mempalace"
  v1_1: "myco promote --from-mempalace {query} → auto-create wiki page from retrieval result"
  v2_0: "Bi-directional: Gear 2 can query MemPalace to check if archived facts contradict current wiki/ content"

# ── Notes ────────────────────────────────────────────────────
notes:
  - "This adapter is a design spec — MemPalace integration requires v1.0 CLI support."
  - "MemPalace is the ONLY adapter with integration_type: L0_backend. All others are content_import or entry_point_upgrade."
  - "Do NOT import MemPalace retrieved facts directly into wiki/ without the W8 header and lint verification."
  - "The L0/L1 boundary matters: L0 is where things get stored. L1 is where things get verified. Don't blur this."
  - "Collection naming: use a project-specific namespace to avoid cross-project contamination."
