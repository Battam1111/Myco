summary: |
  Myco template assumes entry_point: MYCO.md, but projects running under Cowork/Claude Code
  use CLAUDE.md as the auto-loaded L1 index. The template does not account for this environment.

symptom: |
  During ASCC Wave 8 migration, the template-mandated entry_point field conflicted with
  Cowork's auto-load mechanism (CLAUDE.md). Migration required manually overriding
  entry_point to CLAUDE.md in _canon.yaml and inserting Hard Contract directly into CLAUDE.md.

proposed_fix_options:
  - a: "Default entry_point to CLAUDE.md when env_hint: cowork is set in _canon.yaml"
  - b: "Provide a thin CLAUDE.md wrapper template that delegates to MYCO.md"
  - c: "Explicitly document the Cowork/Claude Code entry_point override in migration guide §0"

workaround_applied: "Manual _canon.yaml override + Hard Contract block inserted into CLAUDE.md"
downstream_impact: low  # workaround works; cosmetic friction during migration only
