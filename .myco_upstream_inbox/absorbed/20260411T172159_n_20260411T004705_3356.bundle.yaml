summary: |
  L1 Reference Integrity scanner (lint L1) raises false-positive HIGH errors when
  backtick-quoted strings appear in "forbidden example" context (e.g., listing filenames
  that the agent must NOT create, or referencing external kernel paths as documentation).

symptom: |
  After adding Myco Hard Contract block to CLAUDE.md, 5 L1 HIGH errors appeared for:
    - `docs/agent_protocol.md`  (Myco kernel path, ASCC doesn't have it)
    - `docs/craft_protocol.md`  (same)
    - `forage/_index.yaml`      (ASCC doesn't use forage)
    - `src/myco/lint.py`        (Myco kernel path)
  These are not file references in ASCC — they are docstrings or "do NOT create X" examples.

proposed_fix_options:
  - a: "Add inline suppression comment: <!-- lint-ignore: L1 --> or backtick-nocheck marker"
  - b: "Context-aware scanner: skip backtick paths that appear after 'must not', 'do not', 'forbidden'"
  - c: "Add explicit exclude_from_l1 list to _canon.yaml for known external / kernel paths"

workaround_applied: |
  Removed backticks from kernel path references in CLAUDE.md Hard Contract block,
  changed to plain text. Trades off readability for lint compliance.
downstream_impact: low  # lint passes; minor readability loss in Hard Contract block
