title: "[Idea] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Propose a new feature, direction, or architectural idea for Myco.
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: Describe your idea clearly.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? What friction are you experiencing?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false
