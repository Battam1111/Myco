title: "[Show & Tell] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Share what Myco evolved into on your project! This is the most valuable kind of community contribution — real evolution products from real use.
  - type: input
    id: project-type
    attributes:
      label: Project type
      description: What kind of project did you use Myco on?
      placeholder: e.g., software product, academic paper, data analysis
    validations:
      required: true
  - type: input
    id: duration
    attributes:
      label: Duration & sessions
      placeholder: e.g., 2 weeks, ~15 sessions
    validations:
      required: true
  - type: textarea
    id: what-evolved
    attributes:
      label: What evolved?
      description: What did the knowledge system look like after sustained use? New wiki templates, workflow principles, lint rules?
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Evolution artifacts
      description: Share any wiki templates, lint rules, workflow principles, or other knowledge products that emerged. Code blocks welcome!
    validations:
      required: false
  - type: textarea
    id: lessons
    attributes:
      label: Lessons learned
      description: What would you do differently next time? What surprised you?
    validations:
      required: false
