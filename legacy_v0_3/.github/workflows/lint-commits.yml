name: Lint Commits

# Wave 58 / Wave 3: closes the auto-release loop.
# Fails PRs that contain commits auto-release.yml would silently skip
# (commits without a conventional-commit prefix).

on:
  pull_request:
    branches: [main]

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify every commit in the PR
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          fail=0
          for sha in $(git rev-list "$BASE..$HEAD"); do
            msg=$(git log -1 --pretty=format:%s "$sha")
            if ! python scripts/verify_commit_message.py "$msg"; then
              echo "::error::Commit $sha has non-conventional message: $msg"
              fail=1
            fi
          done
          exit $fail
