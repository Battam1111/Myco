name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[mcp,dev]"
      - name: Run tests
        run: pytest tests/ -q --tb=short
      - name: Run lint
        run: python -m myco immune --project-dir .

  lint-quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[mcp]"
      - name: Quick lint
        run: python -m myco immune --quick --project-dir .

  smoke-install:
    # End-to-end regression: prove a clean install + metabolism loop still works
    # on a substrate that doesn't exist yet. Protects the auto-seed contract and
    # the hunger/eat/reflect/immune verb surface from silent breakage.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install engine (editable, with MCP extra)
        run: pip install -e ".[mcp]"
      - name: Create a fresh downstream project directory
        run: |
          mkdir -p /tmp/myco-smoke
          cd /tmp/myco-smoke
          printf '# Smoke Test Project\n\nUsed by Myco CI smoke-install job.\n' > README.md
      - name: Auto-seed via hunger
        # v0.3.4 (D2): --exit-on=never treats metabolic signals as
        # informational rather than build failures. Cold substrates
        # legitimately fire raw_backlog/no_deep_digest/cold_start — those
        # are diagnostic readings, not broken state. The substrate-present
        # assertion below is the real post-condition gate.
        run: |
          cd /tmp/myco-smoke
          python -m myco hunger --execute --exit-on=never --project-dir .
      - name: Verify substrate was seeded
        run: |
          cd /tmp/myco-smoke
          test -f _canon.yaml || (echo "FAIL: _canon.yaml missing after hunger" && exit 1)
          test -d notes     || (echo "FAIL: notes/ missing after hunger"     && exit 1)
          echo "OK: auto-seed produced _canon.yaml and notes/"
      - name: Eat a note
        run: |
          cd /tmp/myco-smoke
          python -m myco eat --content "CI smoke test marker" --tags smoke,ci --project-dir .
      - name: Reflect
        run: |
          cd /tmp/myco-smoke
          python -m myco reflect --project-dir .
      - name: Immune lint (auto-fix) on fresh substrate
        # v0.3.4 (D1 + D2): skeleton mode auto-downgrades L0/L1 CRITICAL→HIGH
        # when .myco_state/autoseeded.txt exists, and --exit-on=high lets CI
        # still fail if any non-skeleton dimension tripped HIGH. The previous
        # "|| echo" workaround hid real failures; this is architectural.
        run: |
          cd /tmp/myco-smoke
          python -m myco immune --fix --exit-on=mechanical:critical,shipped:critical,metabolic:never,semantic:never --project-dir .
