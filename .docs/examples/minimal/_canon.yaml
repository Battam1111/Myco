# Minimal-example Myco substrate — v0.8.6 schema-v3 shape.
#
# This is the simplest viable downstream substrate: bare write-surface,
# no special-cased subsystems, default skeleton-downgrade marker, default
# hard-contract reference. Adapt `substrate_id` + tags when you fork.
#
# Schema reference: .docs/architecture/L1_CONTRACT/canon_schema.md

schema_version: "3"
contract_version: "v0.8.6"
synced_contract_version: "v0.8.6"

identity:
  substrate_id: "minimal-example"
  tags:
    - "example"
    - "myco"
  entry_point: "MYCO.md"

system:
  # v0.6.14 enum reduction: 2-value (forbidden | opt-in). Most
  # substrates want "forbidden" — keeps the no-LLM-in-substrate
  # invariant active.
  llm_policy: "forbidden"
  write_surface:
    allowed:
      - "_canon.yaml"
      - "MYCO.md"
      - "notes/**"
      - "docs/**"
  hard_contract:
    rules_ref: "https://github.com/Battam1111/Myco/blob/main/docs/architecture/L1_CONTRACT/protocol.md"
    rule_count: 7

versioning:
  package_version_ref: "pyproject.toml"
  pyproject_dynamic: false

lint:
  categories:
    - mechanical
    - shipped
    - metabolic
    - semantic
  exit_policy:
    default: "mechanical:critical,shipped:critical,metabolic:never,semantic:never"
  skeleton_downgrade:
    marker: ".myco/state/autoseeded.txt"
    affected_dimensions: []
  # Downstream substrates pick up the live 47-dim roster from the
  # installed Myco kernel via importlib.metadata.entry_points; no
  # need to maintain a sibling _canon_lint.yaml unless you're
  # registering substrate-local Dimension subclasses.

subsystems:
  germination:
    doc: "https://github.com/Battam1111/Myco/blob/main/docs/architecture/L2_DOCTRINE/genesis.md"
  ingestion:
    doc: "https://github.com/Battam1111/Myco/blob/main/docs/architecture/L2_DOCTRINE/ingestion.md"
  digestion:
    doc: "https://github.com/Battam1111/Myco/blob/main/docs/architecture/L2_DOCTRINE/digestion.md"
  circulation:
    doc: "https://github.com/Battam1111/Myco/blob/main/docs/architecture/L2_DOCTRINE/circulation.md"
  homeostasis:
    doc: "https://github.com/Battam1111/Myco/blob/main/docs/architecture/L2_DOCTRINE/homeostasis.md"
  cycle:
    doc: "https://github.com/Battam1111/Myco/blob/main/docs/architecture/L2_DOCTRINE/cycle.md"
  boundary:
    doc: "https://github.com/Battam1111/Myco/blob/main/docs/architecture/L2_DOCTRINE/boundary.md"

commands:
  manifest_ref: "https://github.com/Battam1111/Myco/blob/main/src/myco/boundary/surface/manifest.yaml"

governance:
  # v0.8.0 schema-v3 field — populated by `myco fruit` when a Living
  # Bets audit lands. LB1 mechanically demands a fresh
  # docs/primordia/v*_living_bets_audit_*.md craft at every MAJOR
  # ratchet; fresh substrates start with `null` (LB1 silent until
  # the first MAJOR molt).
  last_living_bets_audit_at: null

metrics:
  test_count: 0
  lint_dim_count: 47

waves:
  current: 1
  log_ref: "docs/contract_changelog.md"
