# _canon.yaml — minimal fixture peer substrate for federation tests.
# Used by tests/integration/test_propagate_to_fixture_peer.py to
# exercise myco propagate against a real second substrate.
#
# Schema: docs/architecture/L1_CONTRACT/canon_schema.md.
# This canon is intentionally bare — the only contract it must hold is
# "valid enough that load_canon() succeeds and propagate() finds a real
# notes/ tree to write into".

schema_version: "2"
contract_version: "v0.7.5"
synced_contract_version: "v0.7.5"

identity:
  substrate_id: "peer-fixture"
  tags:
    - "test-fixture"
  entry_point: "MYCO.md"
  # v0.6.0 schema v2 additive field. Empty for the fixture — nothing
  # downstream of this peer.
  federation_peers: []

system:
  write_surface:
    allowed:
      - "notes/**"
  hard_contract:
    rule_count: 7
  # v0.6.0 schema v2: bool → enum. "forbidden" is the conservative
  # default for fixture substrates.
  llm_policy: "forbidden"

subsystems:
  circulation: {}
