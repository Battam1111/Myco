# Myco Adapter: OpenClaw (MEMORY.md Architecture)
# ============================================================
# Bridges OpenClaw-style MEMORY.md + daily notes into Myco's four-layer structure.
# OpenClaw is the most popular file-based memory system (346K+ stars).
# Myco is its natural upgrade for long-term, complex projects.
#
# The key transformation:
#   OpenClaw answers: "where did I put that?" (single-loop storage)
#   Myco answers: "is that still true? what changed?" (multi-loop metabolism)
#
# Version: 0.1 | Status: Manual protocol (CLI in v1.0)

name: "OpenClaw (MEMORY.md)"
version: "0.1"
description: |
  Migrate from OpenClaw-style MEMORY.md + daily notes into Myco's four-layer
  knowledge architecture. Non-destructive: MEMORY.md is preserved, Myco layers
  are added on top.

source_type: "memory_files"    # MEMORY.md, SOUL.md, daily/YYYY-MM-DD.md
integration_type: "content_import"
target_layer: "multi_layer"    # Maps to different layers depending on content

# ── Import Steps (v0.x Manual Protocol) ─────────────────────
import_steps:
  1: "Run: myco migrate ./your-openclaw-project to create Myco scaffold (non-destructive)"
  2: "Map MEMORY.md sections to Myco layers (see layer_mapping below)"
  3: "Classify daily notes: recent (last 30 days) → wiki/ | older → L0 Archive (log.md references)"
  4: "Move SOUL.md content into MYCO.md §Hot Zone 'Operational Feel' section (≤5 lines)"
  5: "Run: myco lint --project-dir . — expect L4 orphan warnings for unmapped content (fix iteratively)"
  6: "After first lint pass, run Gear 2 reflection: what from MEMORY.md never got used?"

# ── File Mapping ─────────────────────────────────────────────
layer_mapping:
  "MEMORY.md §Current Tasks":        "MYCO.md §Task Queue (hot zone)"
  "MEMORY.md §Key Facts/Rules":      "wiki/{topic}.md (compile into typed wiki pages)"
  "MEMORY.md §Recent Decisions":     "docs/current/ (append as [date] decision entries)"
  "MEMORY.md §Project Overview":     "MYCO.md §Project Identity"
  "SOUL.md (persona/values)":        "MYCO.md §Operational Feel (≤5 lines)"
  "daily/YYYY-MM-DD.md (recent)":    "log.md (friction/meta entries, summarized)"
  "daily/YYYY-MM-DD.md (archived)":  "L0 Archive reference in log.md"

# ── Lint Checks After Import ──────────────────────────────────
lint_checks:
  - "MYCO.md entry point is accessible (L1)"
  - "All wiki pages created from MEMORY.md have W8 headers and Back-to footers"
  - "_canon.yaml wiki_pages count matches actual wiki/ count"
  - "No reference in MYCO.md points to files that don't exist (L1 integrity)"

# ── What You Get ─────────────────────────────────────────────
value_proposition: |
  OpenClaw MEMORY.md after 6 months: 800 lines of accumulated facts, some outdated,
  some conflicting, none systematically reviewed. Dreaming consolidation trims it
  by context pressure, not by accuracy.

  Myco after 6 months: Lint catches inconsistencies before they cascade.
  Gear 3 retrospective questions which facts are still true.
  Gear 4 distills universal patterns into the next project's bootstrap.

  You keep your OpenClaw files. Myco adds the metabolism layer on top.

# ── Roadmap ──────────────────────────────────────────────────
roadmap:
  v1_0: "myco import --from openclaw ./project/ → auto-classify MEMORY.md sections, create wiki pages"
  v1_1: "myco watch --openclaw → incremental sync as MEMORY.md grows"

# ── Notes ────────────────────────────────────────────────────
notes:
  - "Do NOT import all of MEMORY.md as a single wiki page — that recreates the original problem."
  - "The goal is decomposition: MEMORY.md facts → typed wiki pages (entity/concept/operations)."
  - "OpenClaw's 'dreaming consolidation' and Myco's Gear 2 serve similar purposes but with different standards: dreaming retains by salience, Gear 2 retains by verified accuracy."
  - "SOUL.md is the closest OpenClaw equivalent to Myco's Operational Feel / W6 proximal priming."
