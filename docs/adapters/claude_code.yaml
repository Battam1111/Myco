# Myco Adapter: Claude Code (CLAUDE.md)
# ============================================================
# Entry point upgrade for Claude Code — the native integration path.
# Claude Code reads CLAUDE.md at session start automatically.
# Myco generates CLAUDE.md as the L1 index and .mcp.json for MCP tool access.
#
# This is Myco's home turf:
#   Claude Code reads: CLAUDE.md (auto-loaded) + project files via filesystem
#   Myco generates:    CLAUDE.md (L1 index) + .mcp.json (MCP server config)
#   MCP tools:         19 tools auto-available once .mcp.json is in place
#
# Version: 1.0 | Status: Active

name: "Claude Code"
version: "1.0"
description: |
  Native Myco integration for Claude Code (Anthropic's CLI agent).
  Claude Code auto-loads CLAUDE.md at session start, making it the ideal
  entry point for Myco's L1 index. MCP tools connect via .mcp.json,
  giving Claude Code direct access to all 20 Myco tools (eat, digest,
  hunger, compress, lint, graph, etc.) without any wrapper scripts.

agent_type: "claude_code"
integration_model: "entry_point"
# Claude Code natively reads CLAUDE.md + .mcp.json from the project root.
# This is the zero-friction integration path — no system prompt injection needed.

# -- Setup Steps -----------------------------------------------------------
setup_steps:
  1: "Install Myco: pip install -e '.[mcp]' (editable) or pip install myco"
  2: |
    Initialize with Claude Code agent preset:
    Run: myco seed my-project --agent claude
    This creates: CLAUDE.md (L1 entry point) + .mcp.json (MCP server config)
    + _canon.yaml + notes/ + wiki/ + log.md + skills/ + .myco_state/
  3: |
    If migrating from an existing CLAUDE.md:
    Run: myco graft ./your-project --entry-point CLAUDE.md
    Myco preserves your existing CLAUDE.md content and wraps it with
    the evolution scaffold (index, canon, wiki, log).
  4: |
    Verify MCP connection: open Claude Code in the project directory.
    The 20 Myco MCP tools should appear automatically.
    Test with: call myco_pulse() — should return substrate health dashboard.
  5: "Run: myco immune --project-dir . — establish your baseline"
  6: "First session: call myco_hunger(execute=true) — the organism wakes up"

# -- CLAUDE.md Entry Point -------------------------------------------------
entry_point:
  file: "CLAUDE.md"
  auto_loaded: true
  description: |
    Claude Code automatically reads CLAUDE.md from the project root at
    session start. Myco uses this as the L1 index — the boot surface that
    orients the agent every session. Contains: project identity, hot zone
    (boot signals from hunger), session flow instructions, and hierarchical
    context loading rules.
  template: "src/myco/templates/CLAUDE.md"
  generation: "myco seed --agent claude"

# -- MCP Integration -------------------------------------------------------
mcp_config:
  file: ".mcp.json"
  description: |
    Claude Code reads .mcp.json for MCP server configuration. Myco's
    MCP server exposes 19 tools that give the agent direct metabolic
    access to the knowledge substrate.
  schema: |
    {
      "mcpServers": {
        "myco": {
          "command": "python",
          "args": ["-m", "myco.mcp_server"],
          "env": {"PYTHONUNBUFFERED": "1"}
        }
      }
    }
  tools_count: 20
  key_tools:
    - "myco_hunger — metabolic dashboard + auto-execute repairs"
    - "myco_eat — zero-friction knowledge capture"
    - "myco_digest — lifecycle transitions with reflection prompts"
    - "myco_condense — cohort-based forward compression"
    - "myco_immune — 30-dimensional consistency checking"
    - "myco_mycelium — structural link graph (backlinks, orphans, clusters)"
    - "myco_sense — full-text search across the substrate"
    - "myco_absorb — external content ingestion with provenance"
    - "myco_memory — FTS5 session memory index and search"
    - "myco_pulse — quick health dashboard"

# -- File Ownership ---------------------------------------------------------
coexistence_notes:
  claude_code_managed:
    - "CLAUDE.md — auto-loaded by Claude Code at session start"
    - ".mcp.json — MCP server configuration"
    - ".claude/ — Claude Code internal config directory"
  myco_managed:
    - "CLAUDE.md — L1 Index (shared: Claude Code reads, Myco generates)"
    - ".mcp.json — MCP config (shared: Claude Code reads, Myco generates)"
    - "_canon.yaml — Canonical values SSoT"
    - "wiki/ — Compiled knowledge pages"
    - "notes/ — Atomic note substrate"
    - "docs/ — Framework documentation"
    - "skills/ — Agent skill files"
    - "log.md — Append-only timeline"
    - ".myco_state/ — Operational state (boot brief, session index)"
  important: |
    CLAUDE.md and .mcp.json are the two bridge files — generated by Myco,
    consumed by Claude Code. Both are version-controlled. Myco owns the
    content; Claude Code owns the reading mechanism.

# -- Layer Mapping ----------------------------------------------------------
layer_mapping:
  "CLAUDE.md":          "L1 Index (auto-loaded entry point)"
  ".mcp.json":          "MCP bridge (19 tools)"
  "_canon.yaml":        "L0/L1 SSoT (canonical values)"
  "wiki/*.md":          "L1.5 (compiled knowledge pages)"
  "notes/*.md":         "L1.5 (atomic note substrate)"
  "docs/*.md":          "L2 (framework documentation)"
  "skills/*.md":        "L2 (agent skill files)"
  "log.md":             "Infra (append-only timeline)"
  ".myco_state/":       "Infra (boot brief, session FTS5 index)"

# -- Workflow Compatibility -------------------------------------------------
workflow_compatibility:
  W1_friction_sensing:    "Full — MCP myco_eat captures friction instantly"
  W2_session_reflection:  "Full — MCP myco_reflect generates prompts from log + lint"
  W3_canon_first:         "Full — agent reads _canon.yaml via CLAUDE.md boot"
  W4_wiki_w8:             "Full — agent creates wiki pages via filesystem access"
  W5_lint_gate:           "Full — MCP myco_immune runs 30-dimensional check"
  W8_format:              "Full — CLAUDE.md template includes W8 headers"
  W12_gear_protocol:      "Full — myco_hunger auto-triggers Session Reflection via scheduled metabolic cycle"
  boot_reflex:            "Full — CLAUDE.md hot zone displays hunger boot signals"
  metabolic_cycle:        "Full — scheduled task calls hunger(execute=true) on cron"

# -- Value Proposition -------------------------------------------------------
value_proposition: |
  Claude Code alone: powerful agent, but each session starts from zero.
  Knowledge from last week's debugging is gone. Decisions are re-derived.
  Context window is the only memory, and it resets every session.

  Claude Code + Myco:
    - CLAUDE.md boots the agent with project context every session (auto-loaded)
    - .mcp.json gives direct access to 20 metabolic tools (no wrapper needed)
    - hunger(execute=true) auto-heals: digests stale notes, compresses ripe cohorts
    - 30-dimensional lint catches contradictions across the entire substrate
    - Link graph tracks structural connectivity — no orphan knowledge
    - Session memory (FTS5) lets the agent search what happened 3 weeks ago
    - Skills evolve through mutation-selection within the substrate

  This is the native integration path. Claude Code + Myco = complete organism.

# -- Limitations -------------------------------------------------------------
limitations:
  - "CLAUDE.md size: keep the L1 index concise — large files slow session boot"
  - "MCP tool latency: each tool call is a subprocess invocation, not in-process"
  - "No streaming: MCP tools return complete results, no incremental output"
  - "Session memory depends on .jsonl transcript files in .claude/projects/"

# -- Roadmap ----------------------------------------------------------------
roadmap:
  v0_3: "myco seed --agent claude auto-detects existing CLAUDE.md and offers merge"
  v0_4: "Boot brief injection: hunger signals rendered directly in CLAUDE.md hot zone"
  v1_0: "Full scheduled metabolic cycle with configurable cron expression"

# -- Notes ------------------------------------------------------------------
notes:
  - "This adapter is ACTIVE (v1.0). Claude Code is the primary development agent for Myco itself."
  - "myco seed --agent claude is the one-command setup. No manual file creation needed."
  - "The .mcp.json file must be at the project root for Claude Code to detect it."
  - "Editable install (pip install -e '.[mcp]') is recommended for Myco developers."
  - "CLAUDE.md supports hierarchical loading: subdirectory CLAUDE.md files override parent."
