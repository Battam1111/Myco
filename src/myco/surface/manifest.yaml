# Myco v0.5.3 command manifest — SSoT for CLI + MCP verb surface.
#
# Governing doc: docs/architecture/L3_IMPLEMENTATION/command_manifest.md
# Governing craft: docs/primordia/v0_5_3_fungal_vocabulary_craft_2026-04-17.md
#
# Every verb appears here exactly once. CLI and MCP both read this file.
#
# v0.5.3 renamed 9 verbs to fungal-bionic canonical names. Every old
# name is retained as an alias (CLI + MCP); invoking an alias fires a
# one-shot DeprecationWarning. Aliases are scheduled to be removed at
# v1.0.0, giving the entire 0.x tail full backward compatibility.
schema_version: "1"

commands:
  - name: "germinate"
    subsystem: "germination"
    handler: "myco.germination.germinate:run_cli"
    summary: "Germinate a fresh Myco substrate in project-dir."
    mcp_tool: "myco_germinate"
    pre_substrate: true
    aliases: ["genesis"]
    mcp_tool_aliases: ["myco_genesis"]
    args:
      - name: "project-dir"
        type: "path"
        required: true
        help: "Directory that will host the new substrate."
      - name: "substrate-id"
        type: "str"
        required: true
        help: "Identifier for the new substrate."
      - name: "tags"
        type: "list[str]"
        default: []
        help: "Affiliation tags (not boundaries)."
      - name: "entry-point"
        type: "str"
        default: "MYCO.md"
        help: "Agent-entry filename."
      - name: "dry-run"
        type: "bool"
        default: false
        help: "Preview files without writing."

  - name: "hunger"
    subsystem: "ingestion"
    handler: "myco.ingestion.hunger:run"
    summary: "Report substrate hunger and optionally patch entry-point."
    mcp_tool: "myco_hunger"
    args:
      - name: "execute"
        type: "bool"
        default: false
        help: "Write boot brief and patch entry-point signals."

  - name: "eat"
    subsystem: "ingestion"
    handler: "myco.ingestion.eat:run"
    summary: "Capture a raw note from text, a file path, a directory, or a URL."
    mcp_tool: "myco_eat"
    args:
      - name: "content"
        type: "str"
        help: "Note body (literal text). Mutually exclusive with --path/--url."
      - name: "path"
        type: "path"
        help: "File or directory to ingest via the adapter registry. A dir produces one note per ingestible file."
      - name: "url"
        type: "str"
        help: "URL to fetch and ingest (requires myco[adapters] extras)."
      - name: "tags"
        type: "list[str]"
        default: []
        help: "Tags attached to this note."
      - name: "source"
        type: "str"
        default: "agent"
        help: "Origin tag for this note (overridden by adapter provenance when using --path/--url)."

  - name: "sense"
    subsystem: "ingestion"
    handler: "myco.ingestion.sense:run"
    summary: "Search the substrate by keyword."
    mcp_tool: "myco_sense"
    args:
      - name: "query"
        type: "str"
        required: true
        help: "Search term."

  - name: "forage"
    subsystem: "ingestion"
    handler: "myco.ingestion.forage:run"
    summary: "List ingestible files under a path."
    mcp_tool: "myco_forage"
    args:
      - name: "path"
        type: "path"
        default: null
        help: "Directory to scan (defaults to substrate root)."

  - name: "assimilate"
    subsystem: "digestion"
    handler: "myco.digestion.assimilate:run"
    summary: "Assimilate raw notes into integrated (bulk-promote)."
    mcp_tool: "myco_assimilate"
    aliases: ["reflect"]
    mcp_tool_aliases: ["myco_reflect"]
    args:
      - name: "note-id"
        type: "str"
        default: null
        help: "Optional single note id to promote."

  - name: "digest"
    subsystem: "digestion"
    handler: "myco.digestion.digest:run"
    summary: "Promote a single raw note to integrated."
    mcp_tool: "myco_digest"
    args:
      - name: "note-id"
        type: "str"
        required: true
        help: "Stem of the note to promote."
      - name: "dry-run"
        type: "bool"
        default: false
        help: "Preview without moving the file."

  - name: "sporulate"
    subsystem: "digestion"
    handler: "myco.digestion.sporulate:run"
    summary: "Bundle integrated notes into a proposal skeleton (Agent writes the synthesis prose separately)."
    mcp_tool: "myco_sporulate"
    aliases: ["distill"]
    mcp_tool_aliases: ["myco_distill"]
    args:
      - name: "slug"
        type: "str"
        required: true
        help: "Slug for the proposed doctrine."
      - name: "sources"
        type: "list[str]"
        default: []
        help: "Optional explicit source note paths."

  - name: "traverse"
    subsystem: "circulation"
    handler: "myco.circulation.traverse:run"
    summary: "Walk the mycelial graph to report anastomotic health."
    mcp_tool: "myco_traverse"
    aliases: ["perfuse"]
    mcp_tool_aliases: ["myco_perfuse"]
    args:
      - name: "scope"
        type: "str"
        default: "all"
        help: "One of: canon, notes, docs, all."

  - name: "propagate"
    subsystem: "circulation"
    handler: "myco.circulation.propagate:run"
    summary: "Propagate integrated/distilled notes to a downstream substrate."
    mcp_tool: "myco_propagate"
    args:
      - name: "dst"
        type: "path"
        required: true
        help: "Downstream substrate root."
      - name: "select"
        type: "str"
        default: "integrated"
        help: "One of: integrated, distilled, both."
      - name: "commit"
        type: "str"
        default: null
        help: "Source commit stamp."
      - name: "dry-run"
        type: "bool"
        default: false
        help: "Preview without writing."

  - name: "immune"
    subsystem: "homeostasis"
    handler: "myco.homeostasis.kernel:run_cli"
    summary: "Run immune lint over the substrate."
    mcp_tool: "myco_immune"
    args:
      - name: "dimensions"
        type: "list[str]"
        default: []
        help: "Optional subset of dimension ids."
      - name: "fix"
        type: "bool"
        default: false
        help: "Apply safe fixes (no-op at B.7)."
      - name: "list"
        type: "bool"
        default: false
        help: "Enumerate every dimension (id, category, severity) without running."
      - name: "explain"
        type: "str"
        default: null
        help: "Print the prose description for a single dimension id."

  - name: "senesce"
    subsystem: "cycle"
    handler: "myco.cycle.senesce:run"
    summary: "Senesce the session: assimilate + immune --fix before compaction."
    mcp_tool: "myco_senesce"
    aliases: ["session-end"]
    mcp_tool_aliases: ["myco_session_end"]
    args: []

  - name: "fruit"
    subsystem: "cycle"
    handler: "myco.cycle.fruit:run"
    summary: "Fruit a new three-round primordia doc under docs/primordia/."
    mcp_tool: "myco_fruit"
    aliases: ["craft"]
    mcp_tool_aliases: ["myco_craft"]
    args:
      - name: "topic"
        type: "str"
        required: true
        help: "Topic phrase; slugged to <slug> and written as <slug>_craft_<date>.md."
      - name: "kind"
        type: "str"
        default: "design"
        help: "Free-form kind tag (design / audit / migration / …)."
      - name: "date"
        type: "str"
        default: null
        help: "Override the date stamp (YYYY-MM-DD); defaults to today."

  - name: "molt"
    subsystem: "cycle"
    handler: "myco.cycle.molt:run"
    summary: "Molt the contract version: bump _canon.yaml + append contract_changelog entry."
    mcp_tool: "myco_molt"
    aliases: ["bump"]
    mcp_tool_aliases: ["myco_bump"]
    args:
      - name: "contract"
        type: "str"
        required: true
        help: "New contract version (e.g. 'v0.5.3')."
      - name: "dry-run"
        type: "bool"
        default: false
        help: "Preview the canon patch + changelog section without writing."
      - name: "date"
        type: "str"
        default: null
        help: "Override the date stamp (YYYY-MM-DD); defaults to today."

  - name: "winnow"
    subsystem: "cycle"
    handler: "myco.cycle.winnow:run"
    summary: "Winnow a proposal document's shape against craft-protocol gates."
    mcp_tool: "myco_winnow"
    aliases: ["evolve"]
    mcp_tool_aliases: ["myco_evolve"]
    args:
      - name: "proposal"
        type: "path"
        required: true
        help: "Path to the proposal markdown (relative to substrate root or absolute)."

  - name: "ramify"
    subsystem: "cycle"
    handler: "myco.cycle.ramify:run"
    summary: "Ramify: scaffold a new verb / dimension / adapter (kernel or substrate-local)."
    mcp_tool: "myco_ramify"
    aliases: ["scaffold"]
    mcp_tool_aliases: ["myco_scaffold"]
    args:
      - name: "verb"
        type: "str"
        default: null
        help: "Manifest verb name whose handler stub to generate."
      - name: "dimension"
        type: "str"
        default: null
        help: "Lint dimension id to scaffold (e.g. 'LOCAL1'). Requires --category and --severity."
      - name: "category"
        type: "str"
        default: null
        help: "Dimension category (mechanical/shipped/metabolic/semantic). Used with --dimension."
      - name: "severity"
        type: "str"
        default: null
        help: "Dimension default severity (low/medium/high/critical). Used with --dimension."
      - name: "adapter"
        type: "str"
        default: null
        help: "Adapter name to scaffold (e.g. 'jira'). Requires --extensions."
      - name: "extensions"
        type: "list[str]"
        default: []
        help: "File extensions the adapter handles (e.g. .jira .json). Used with --adapter."
      - name: "substrate-local"
        type: "bool"
        default: false
        help: "Write under <substrate>/.myco/plugins/ instead of src/myco/. Auto-on when substrate != myco-self."
      - name: "force"
        type: "bool"
        default: false
        help: "Overwrite an existing file (default: refuse)."

  - name: "graft"
    subsystem: "cycle"
    handler: "myco.cycle.graft:run"
    summary: "Enumerate / validate / explain substrate-local plugins (hyphal anastomosis observer)."
    mcp_tool: "myco_graft"
    args:
      - name: "list"
        type: "bool"
        default: false
        help: "List every loaded local plugin (kind, name, source path)."
      - name: "validate"
        type: "bool"
        default: false
        help: "Re-run the import + registration gate and report any errors."
      - name: "explain"
        type: "str"
        default: null
        help: "Single plugin name to describe (source file + docstring)."

  - name: "brief"
    subsystem: "cycle"
    handler: "myco.cycle.brief:run"
    summary: "Markdown rollup of substrate state for the one human reading moment (L0 principle 1's single carved exception)."
    mcp_tool: "myco_brief"
    args: []
