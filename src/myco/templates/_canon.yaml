# Canonical Values — Single Source of Truth
# All documents must be consistent with values in this file.
# Update flow: change this file first → run lint → fix inconsistencies → re-run
#
# Myco Knowledge System — https://github.com/{{GITHUB_USER}}/myco

system:
  principles_count: 12               # W1-W12
  principles_label: "十二原则"
  entry_point: "{{ENTRY_POINT}}"      # Filename of the L1 entry document (override: CLAUDE.md for Claude, GPT.md for GPT, etc.)

  # ── Upstream Protocol v1.0 (contract version lock) ─────────────────────────
  # See kernel docs/agent_protocol.md §8. Instance agents MUST compare
  # synced_contract_version against the kernel's contract_version at boot
  # and refresh local reflexes if drift is detected.
  synced_contract_version: "v0.20.0"  # last kernel contract the instance aligned with
  upstream_scan_last_run: null         # ISO-8601 timestamp of last upstream scan

  # --- Upstream scan staleness reader (Wave 17, v0.16.0) ---
  upstream_scan:
    stale_days: 7
    enabled: true

  # --- Boot Brief Injector (Wave 17, v0.16.0) --------------
  boot_brief:
    enabled: true
    brief_path: ".myco_state/boot_brief.md"
    sentinel_begin: "<!-- MYCO-BOOT-SIGNALS:BEGIN"
    sentinel_end: "<!-- MYCO-BOOT-SIGNALS:END -->"
    priority_signals:
      - contract_drift
      - raw_backlog
      - upstream_scan_stale
      - craft_reflex_missing
      - session_end_drift

  # --- Self-Correction Contract (Wave 19, contract v0.18.0) --------------
  # Hard Contract rule #3 special clause declarative form. `myco correct`
  # CLI shortcut force-merges these tags; manual `myco eat` should also
  # apply this exact pair when the self-correction condition applies.
  self_correction:
    mandatory_tags:
      - friction-phase2
      - on-self-correction

  # --- Boot Reflex Arc (Wave 13, contract v0.12.0) ------------------------
  # Authoritative craft: kernel docs/primordia/boot_reflex_arc_craft_2026-04-11.md
  # Parent principles: W1 (autopilot) + Upstream Protocol v1.0 §8.4
  #
  # Three reflexes enforced in-session at HIGH severity:
  #   (1) contract_drift   — local synced_contract_version ≠ kernel contract_version
  #   (2) raw_backlog HIGH — W1 violation when pure-raw count > threshold
  #   (3) boot hunger wiring — myco_status surfaces reflex signals on invocation
  #
  # `[REFLEX HIGH]` prefix distinguishes reflex signals from advisory ones.
  # raw_backlog counts only pure-raw notes: digest_count == 0 AND
  # source not in raw_exempt_sources. digesting-state notes are held, not raw.
  boot_reflex:
    enabled: true
    severity: HIGH
    raw_backlog_threshold: 10
    reflex_prefix: "[REFLEX HIGH]"
    raw_exempt_sources:
      - bootstrap
    # Wave 20 (v0.19.0): grandfather exemption lapses after this many
    # minor versions of drift. Runs before `enabled` gate — missing /
    # disabled boot_reflex blocks still fire on excessive drift. Set
    # higher to loosen, 0 for strict lockstep. See kernel
    # docs/primordia/silent_fail_elimination_craft_2026-04-11.md.
    grandfather_ceiling_minor_versions: 5

  # --- Session End Reflex Arc (Wave 14, contract v0.13.0) ----------------
  # Advisory detector for Gear 2 reflection + Gear 4 sweep drift. LOW
  # severity — appears in hunger advisory list, does not block task work.
  # Authoritative craft: kernel docs/primordia/session_end_reflex_arc_craft_2026-04-11.md
  session_end_reflex:
    enabled: true
    severity: LOW
    log_scan_cap_bytes: 5242880
    gear2:
      enabled: true
      drift_threshold_entries: 15
      reflection_marker: meta
    gear4:
      enabled: true
      drift_threshold_days: 5
      candidate_marker: g4-candidate
      resolution_markers:
        - g4-pass
        - g4-landed
        - g4-resolved

  upstream_channels:
    # Path-based classification — strictest-class-wins. See §8.2.
    class_x:                           # Auto-mergeable
      - log.md
      - notes/**
      - examples/**
    class_y:                           # Inline-confirm (docs / wiki prose)
      - wiki/**
      - docs/**
    class_z:                           # Review-required (contract / lint / templates)
      - docs/agent_protocol.md
      - docs/craft_protocol.md
      - scripts/lint_knowledge.py
      - src/myco/lint.py
      - src/myco/mcp_server.py
      - _canon.yaml
      - src/myco/templates/**
      - forage/_index.yaml             # v0.7.0 — forage manifest is class_z

  # ── Craft Protocol v1 (W3, kernel contract v0.3.0) ─────────────────────────
  # Formal ritual for raising decision confidence via structured self-
  # adversarial debate. See kernel docs/craft_protocol.md for full spec.
  # L13 enforces frontmatter schema on files declaring
  # craft_protocol_version: 1. Files without this field are grandfathered.
  craft_protocol:
    version: 1
    dir: docs/primordia
    filename_pattern: '^[a-z][a-z0-9]*(_[a-z0-9]+){1,}_craft_\d{4}-\d{2}-\d{2}(_[0-9a-f]{4})?\.md$'
    required_frontmatter:
      - type
      - status
      - created
      - target_confidence
      - current_confidence
      - rounds
      - craft_protocol_version
      - decision_class
    valid_statuses:
      - DRAFT
      - ACTIVE
      - COMPILED
      - SUPERSEDED
      - LOCAL
    min_rounds: 2
    confidence_targets_by_class:
      kernel_contract: 0.90
      instance_contract: 0.85
      exploration: 0.75
    stale_active_threshold_days: 30
    # ── Body schema (Wave 15, contract v0.14.0) ──────────────────────────
    # Partial closure of craft_protocol.md §7 #3. L13 verifies body_chars
    # and Round heading count against frontmatter-declared rounds.
    # Authoritative craft: kernel docs/primordia/l13_body_schema_craft_2026-04-11.md
    body_schema:
      enabled: true
      min_body_chars_per_round: 200
      min_round_body_chars: 150
      round_markers:
        - 'Round\s+(\d+)'
        - 'R(\d+)\b'
        - '第\s*([一二三四五六七八九十\d]+)\s*轮'
        - 'ラウンド\s*(\d+)'
      exempt_files: []
    # ── Craft Reflex (contract v0.10.0, Wave 11) ─────────────────────────
    # Active discovery surface: turns passive triggers into an emitted
    # LOW signal when a listed surface was touched without craft evidence.
    # See kernel docs/craft_protocol.md §3.1 and
    # docs/primordia/craft_reflex_craft_2026-04-11.md.
    reflex:
      enabled: true
      lookback_days: 3
      # Wave 12 (v0.11.0): severity HIGH. Reflex is an immutable arc,
      # not advisory. Agent obligation on fire: write the missing
      # craft in-session before any other kernel-class action.
      severity: HIGH
      # Trivial-edit exemption. <= this many lines AND no new
      # identifiers added (checked via `git diff --numstat` +
      # identifier regex) → skip the reflex. Git unavailable =
      # fail-closed (fire anyway).
      trivial_exempt_lines: 20
      trigger_surfaces:
        kernel_contract:
          - docs/agent_protocol.md
          - docs/craft_protocol.md
          - docs/contract_changelog.md   # Wave 18 (v0.17.0)
          - _canon.yaml
          - src/myco/lint.py
          - src/myco/mcp_server.py
          - src/myco/notes.py             # Wave 18 (v0.17.0)
          - src/myco/notes_cmd.py         # Wave 18 (v0.17.0)
          - src/myco/templates/_canon.yaml
          - src/myco/templates/MYCO.md
        public_claim:
          - README.md
          - README_zh.md
          - README_ja.md
          - MYCO.md
          - docs/vision.md
      evidence_pattern: '(docs/primordia/[a-z0-9_]+_craft_\d{4}-\d{2}-\d{2}(_[0-9a-f]{4})?\.md|craft_reference\s*:)'

  # ── Structural Limits (contract v0.5.0) ─────────────────────────────────────
  # Soft limits that feed the `structural_bloat` hunger signal. Not hard
  # lints — structural bloat is a gradual degradation, not a contract
  # violation. See docs/biomimetic_map.md §4 and
  # docs/primordia/biomimetic_restructure_craft_2026-04-11.md.
  structural_limits:
    docs_top_level_soft_limit: 20
    primordia_soft_limit: 40
    exclude_paths:
    - docs/agent_protocol.md
    - docs/craft_protocol.md
    - docs/contract_changelog.md
    - docs/biomimetic_map.md
    - docs/WORKFLOW.md
    - docs/vision.md
    - docs/theory.md
    - docs/architecture.md
    - docs/open_problems.md
    - docs/evolution_engine.md

  wiki_page_types:
    - entity
    - concept
    - operations
    - analysis
    - craft
  evolution_gears: 4                 # Gear 1-4
  myco_md_max_lines: 300
  stale_patterns:                    # Known outdated phrases to detect
    - "五原则"
    - "六原则"
    - "七原则"

  # ── Digestive substrate (four-command set: eat/digest/view/hunger) ────────
  # Atomic notes live in <root>/notes/ as flat files with YAML frontmatter.
  # L10 lint enforces this schema on every notes/*.md.
  notes_schema:
    dir: notes
    filename_pattern: '^n_\d{8}T\d{6}_[0-9a-f]{4}\.md$'
    required_fields:
      - id
      - status
      - source
      - tags
      - created
      - last_touched
      - digest_count
      - promote_candidate
      - excrete_reason
    # Optional fields (v0.4.0+) — documented for discovery, not enforced by L10.
    optional_fields:
      - view_count              # int, default 0; bumped by `myco view <id>`
      - last_viewed_at          # ISO str or null; set by `myco view <id>`
    valid_statuses:
      - raw            # just ingested, not yet processed
      - digesting      # being read / summarized / extracted
      - extracted      # key claim lifted into wiki or entry point
      - integrated     # fully merged into canonical structures
      - excreted       # removed from active rotation (must cite reason)
    # Self-Model D layer seed (v0.4.0) — dead knowledge detection config.
    terminal_statuses:
      - extracted
      - integrated
    dead_knowledge_threshold_days: 30
    valid_sources:
      - chat                # pulled from conversation context
      - eat                 # user/agent invoked `myco eat` explicitly
      - promote             # grown from another note
      - import              # bulk ingested from external tool
      - bootstrap           # created during myco init
      - forage              # v0.7.0 — digested extract from a forage/ item
      - upstream_absorbed   # v0.9.0 — pointer note from myco upstream ingest

  # ── Forage Substrate (contract v0.7.0) ────────────────────────────────────
  # Inbound channel — external reference material (papers, repos, articles)
  # staged in forage/ for pre-digestion before entering notes/.
  # Authoritative craft: kernel docs/primordia/forage_substrate_craft_2026-04-11.md.
  # L14 Forage Hygiene enforces manifest + lifecycle rules.
  forage_schema:
    dir: forage
    index_file: forage/_index.yaml
    filename_pattern: '^f_\d{8}T\d{6}_[0-9a-f]{4}$'
    required_item_fields:
      - id
      - source_url
      - source_type
      - local_path
      - acquired_at
      - status
      - license                # REQUIRED. "unknown" → auto-quarantined.
      - size_bytes
    optional_item_fields:
      - license_restrictions
      - license_checked_at
      - digest_target
      - notes
      - why
    valid_source_types:
      - paper
      - repo
      - article
      - other
    valid_statuses:
      - raw
      - digesting
      - digested
      - absorbed
      - discarded
      - quarantined
    max_item_size_bytes: 10485760        # 10 MB per-item soft cap
    forage_backlog_threshold: 5          # ≥5 raw items triggers hunger
    stale_raw_days: 14                   # raw > 14 days triggers hunger
    total_budget_bytes: 209715200        # 200 MB soft total (hunger)
    hard_budget_bytes: 1073741824        # 1 GB hard cap (L14 HIGH)
    license_recheck_days: 90

  write_surface:
    # L11 Write-Surface Lint — agents may only write to these paths.
    # Extend as needed for your project's legitimate top-level dirs.
    # See Myco kernel docs/agent_protocol.md §1 for the contract.
    allowed:
      - notes/
      - wiki/
      - forage/                        # v0.7.0 — external reference substrate
      - docs/
      - log.md
      - MYCO.md
      - _canon.yaml
      - src/
      - scripts/
      - tests/
      - README.md
      - .gitignore
      - .github/
    forbidden_top_level:
      - scratch.md
      - notes.md
      - TODO.md
      - MEMO.md
      - ideas.md
      - draft.md
      - summary.md
      - thoughts/
      - tmp/
      - temp/

  # ── Quantified Indicators (contract v0.8.0, Wave 8) ───────────────────────
  # Schema-only. Current values live in the instance's L1 entry document
  # (e.g. MYCO.md / CLAUDE.md / GPT.md) under the "📊 指标面板" section.
  # Authoritative craft: kernel docs/primordia/pre_release_rebaseline_craft_2026-04-11.md
  #
  # Rule: any number expressing progress / confidence / maturity / saturation /
  # pressure MUST live in [0.0, 1.0] and use one of the approved suffixes.
  # Handwritten bootstrap values MUST be ≤ 0.70 unless backed by external event.
  indicators:
    range: [0.0, 1.0]
    bootstrap_ceiling_without_evidence: 0.70
    valid_suffixes:
      - _progress
      - _confidence
      - _maturity
      - _saturation
      - _pressure
    rationale_required: true
    stale_after_days: 90
    authoritative_value_location: "{{ENTRY_POINT}}#指标面板"
    history_location: log.md
    # substrate_keys is instance-defined; kernel provides no defaults.
    substrate_keys: []

architecture:
  layers: 4                          # L1 + L1.5 + L2 + L3
  wiki_pages: 0                      # Starts at 0, grows organically

project:
  name: "{{PROJECT_NAME}}"
  current_phase: "{{CURRENT_PHASE}}"
  # Add project-specific canonical values below:
  # milestone_dates: {}
  # key_metrics: {}
  # baselines: {}

