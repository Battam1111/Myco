[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "myco"
dynamic = ["version"]
description = "Agent-First symbiotic cognitive substrate — v0.4.0 greenfield rewrite."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [
  { name = "Yanjun" },
]
dependencies = [
  "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
]

[project.scripts]
# Points at a target that does not yet exist; lands with Stage B.7 (surface/cli.py).
# Documented in docs/primordia/stage_a_scaffold_craft_2026-04-15.md.
myco = "myco.surface.cli:main"

[tool.hatch.version]
# Single source of truth for the package version — per L1 versioning.md.
path = "src/myco/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/myco"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --strict-config"
pythonpath = ["src"]
