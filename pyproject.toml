[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "myco"
version = "0.9.0"
description = "Self-Evolving Knowledge Substrate for AI Agents"
readme = "README.md"
license = "MIT"
requires-python = ">=3.8"
authors = [
    { name = "Myco Contributors" },
]
keywords = [
    "ai", "agents", "knowledge-management", "self-evolving",
    "cognitive-substrate", "llm", "memory", "extended-cognition",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "pyyaml>=5.0",
]

[project.urls]
Homepage = "https://github.com/Battam1111/Myco"
Repository = "https://github.com/Battam1111/Myco"
Issues = "https://github.com/Battam1111/Myco/issues"
Documentation = "https://github.com/Battam1111/Myco/tree/main/docs"

[project.scripts]
myco = "myco.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/myco"]

[tool.hatch.build.targets.sdist]
include = [
    "src/myco/**",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]
