[tool.hatch.version]
# Single source of truth for the package version — per L1 versioning.md.
path = "src/myco/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/myco"]

[tool.hatch.build.targets.sdist]
# v0.8.4 root-cleanup (2026-05-12): 3 content directories (tests/,
# docs/, scripts/) moved to dot-prefixed hidden form (.tests/, .docs/,
# .scripts/) so the repo root carries: LICENSE / README.md /
# pyproject.toml + src/ + 14 hidden entries. src/ stays visible
# because an editable install can't be reinstalled while
# `mcp-server-myco.exe` is in use; the user's Claude Desktop session
# locks the binary. src/ relocation is a separate craft if the user
# wants the absolute minimum (3 files, 0 visible folders).
include = [
  "/src",
  "/.tests",
  "/.docs",
  "/.scripts",
  "/.plugin",
  "/.claude-plugin",
  "/.claude",
  "/.github",
  "/.docker",
  "/.meta",
  "/.mcp.json",
  "/README.md",
  "/LICENSE",
  "/pyproject.toml",
]
# v0.8.4 root-cleanup (2026-05-12): collapsed several explicit root
# entries into broader globs after structural moves:
#   - README_zh.md + README_ja.md → docs/i18n/   (covered by /docs)
#   - CONTRIBUTING.md + CODE_OF_CONDUCT.md + SECURITY.md +
#     CITATION.cff → .github/                   (covered by /.github)
#   - assets/ → docs/assets/                     (covered by /docs)
#   - examples/ → docs/examples/                 (covered by /docs)
#   - agents/ + commands/ + hooks/ + skills/    → plugin/{...}/
# `/docs/INSTALL.md` removed (redundant: /docs already covers it).
# `/plugin` added so the v0.8.4 plugin-bundle parent ships in sdist.
exclude = [
  "/.release_notes_*.md",
  "/upload*.log",
  "/dist",
  "/build",
  "/.pytest_cache",
  "/.venv",
  "**/__pycache__",
]

[tool.pytest.ini_options]
# v0.8.4 root-cleanup (2026-05-12): tests/ and src/ relocated to
# hidden .tests/ and src/ for root minimalism.
testpaths = [".tests"]
# v0.6.0 §K.3 / §K.4: enable coverage gate + xdist parallel by default.
# CI runs --cov-report=xml + per-package floors via .scripts/coverage_floors.py.
addopts = "-ra --strict-markers --strict-config"
pythonpath = ["src"]
# v0.8.4 root-cleanup (2026-05-12): redirect pytest cache from
# default `.pytest_cache/` (visible root dotdir) to `.cache/pytest/`
# under a single consolidated cache parent. .mypy_cache + .ruff_cache
# are similarly redirected via their own tool sections below.
cache_dir = ".cache/pytest"
# v0.7.6 (graph-builder benchmark suite): the ``benchmark`` marker
# tags the slow scale tests under ``tests/benchmark/`` so a normal
# ``pytest`` run can exclude them via ``-m "not benchmark"`` and a
# scheduled run can target them via ``-m benchmark``. The tests also
# self-skip unless ``MYCO_RUN_BENCHMARKS=1`` is set, so omitting the
# ``-m`` flag is safe — the env-var gate is the primary defence;
# the marker is a registered alias for the same set.
markers = [
    "benchmark: slow opt-in scale benchmarks (env: MYCO_RUN_BENCHMARKS=1)",
    "multimedia: tests for the v0.8.0 [multimedia] adapter trio (audio / image-OCR / video-frame). Happy paths use mocks; tests run unconditionally (no real whisper/tesseract/cv2 dep needed).",
]

[tool.coverage.run]
# v0.6.0 §K.3 — coverage configuration introduced.
# v0.8.4 root-cleanup (2026-05-12): src/ moved to src/.
source = ["src/myco"]
branch = true
omit = [
  # boundary symbionts have OS-conditional code paths covered only on
  # the matching CI matrix cell; per-package floor (60%) compensates.
  "*/symbionts/*",
]

[tool.coverage.report]
fail_under = 85
show_missing = true
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if TYPE_CHECKING:",
]

# -----------------------------------------------------------------------------
# v0.5.7 — Tool baselines (locked for CI consumption)
# -----------------------------------------------------------------------------

[tool.mypy]
# The v0.5.7 baseline is deliberately permissive: we opt in to the two
# hygiene flags (unused ignores, redundant casts) without forcing
# strict-mode over the whole repo. That lets us fix real type drift
# incrementally without blocking small PRs on an explosion of Any leaks.
# The CI workflow runs `mypy src/myco` only (not tests/) — tests import
# via fixtures that would need extensive stub work.
python_version = "3.10"
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = false
show_error_codes = true
# Modules without third-party stubs: don't crash, just log.
ignore_missing_imports = true
# v0.8.4 root-cleanup (2026-05-12): redirect mypy cache from default
# `.mypy_cache/` to consolidated `.cache/mypy/`.
cache_dir = ".cache/mypy"
# v0.6.0 §K.4: extend mypy to tests/ with disallow_untyped_defs=false
# (test fixtures may stay untyped); ratchets toward stricter typing
# over v0.6.x via mypy_tests_baseline.txt.

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
ignore_errors = true  # initial baseline; tighten over v0.6.x

[tool.ruff]
target-version = "py310"
line-length = 88
# v0.8.4 root-cleanup (2026-05-12): src/ + tests/ moved to src/ + .tests/.
src = ["src", ".tests"]
# v0.8.4 root-cleanup (2026-05-12): redirect ruff cache from default
# `.ruff_cache/` to consolidated `.cache/ruff/`.
cache-dir = ".cache/ruff"
# Exclude runtime caches so ruff doesn't report on files we
# intentionally do not maintain.
exclude = [
  ".myco/state",
  ".venv",
  "dist",
  "build",
]

[tool.ruff.lint]
# Conservative but non-trivial selection: errors + pycodestyle
# warnings + import discipline + modernization + common security
# + common correctness + common simplification. S (bandit) is kept
# out of the default because `assert` use in tests would flood
# findings; tests opt in via per-file-ignores below if needed.
select = [
  "E",     # pycodestyle errors
  "W",     # pycodestyle warnings
  "F",     # pyflakes
  "I",     # isort (import ordering)
  "B",     # flake8-bugbear
  "UP",    # pyupgrade (3.10+ idioms)
  "SIM",   # flake8-simplify
  "C4",    # flake8-comprehensions
  "RUF",   # ruff-specific
]
# RUF001 (ambiguous unicode) fires on legitimate typographic dashes in
# changelog templates; RUF022 (unsorted __all__) is low-value churn;
# E501 line-too-long is covered informally by `ruff format`. Line
# length enforcement happens through the formatter, not the linter.
ignore = [
  "E501",
  "RUF001",
  "RUF022",
  "RUF043",  # pytest.raises ambiguous pattern — low-signal
  "SIM105",  # contextlib.suppress rewrite — cosmetic
  "SIM108",  # if-else vs if-exp — cosmetic
  "SIM110",  # any() rewrite — cosmetic
  "SIM117",  # combined with statements — cosmetic on test I/O contexts
  "B904",    # raise from — cosmetic on already-intentional patterns
]

[tool.ruff.lint.per-file-ignores]
# Test files are allowed to use asserts and may skip some stylistic
# rules that make sense only in production code.
".tests/**" = ["B017"]
# Generated / template strings in the ramify scaffolder include
# example code that intentionally uses old-style typing etc.
"src/myco/cycle/ramify.py" = ["UP035"]

[tool.ruff.format]
# Ruff's formatter is stable enough to be our canonical formatter.
# Running `ruff format` produces deterministic output identical to
# `black` on the vast majority of cases (double-quoted strings,
# trailing commas in multi-line collections, etc.). Declaring it here
# pins the convention so contributor diffs don't churn on formatter
# version drift.
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
