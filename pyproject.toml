[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "myco"
dynamic = ["version"]
description = "Agent-First symbiotic cognitive substrate. 20 fungal-named verbs (19 agent + 1 human-facing `brief`), 50-dimension immune across 7 subsystems, substrate-local plugins via .myco/plugins/, editable-by-default install, universal MCP stdio + streamable-http server with OAuth 2.1, schema v3 canon."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [
  { name = "Yanjun" },
]
keywords = [
  "agent",
  "substrate",
  "knowledge-management",
  "mcp",
  "model-context-protocol",
  "mycelium",
  "cognitive",
  "agent-first",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Typing :: Typed",
]
dependencies = [
  "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/Battam1111/Myco"
Repository = "https://github.com/Battam1111/Myco"
Documentation = "https://github.com/Battam1111/Myco/tree/main/docs"
Changelog = "https://github.com/Battam1111/Myco/blob/main/.docs/contract_changelog.md"
"Bug Tracker" = "https://github.com/Battam1111/Myco/issues"

[project.optional-dependencies]
# ``pip install 'myco[mcp]'`` — pulls in the Model Context Protocol SDK
# so ``python -m myco.boundary.mcp`` (and any other MCP adapter) has what it needs.
# Floor of 1.2 covers the FastMCP.run() entry point used by the launcher;
# the low-level Server API has been stable across the entire 1.x line.
mcp = [
  "mcp>=1.2",
]
# ``pip install 'myco[adapters]'`` — pulls in optional deps for
# ingestion adapters: PDF, HTML, and URL. The built-in text-file,
# code-repo, CSV/JSON/JSONL, and tabular adapters use only the
# standard library and work without this extras target.
adapters = [
  "httpx>=0.27",
  "pypdf>=4.0",
  "beautifulsoup4>=4.12",
]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  # v0.6.0 §K.4: parallel test execution. ``--dist loadfile`` keeps
  # conftest fixture state intact across worker boundaries.
  "pytest-xdist>=3.5",
  # v0.5.7: pin the type-stub floor so `mypy src/myco` runs clean on a
  # fresh `pip install -e ".[dev]"` without an extra "missing stubs"
  # round. types-PyYAML provides the stubs mypy asks for when it sees
  # our ``import yaml`` / ``yaml.safe_load`` calls.
  "types-PyYAML>=6.0",
  # Linter + formatter for the baseline encoded in [tool.ruff] below.
  # Floor pegged at the ruff that introduced --unsafe-fixes stabilized
  # semantics so CI rules do not drift as ruff releases roll forward.
  "ruff>=0.5",
  # Static type checker for the baseline in [tool.mypy] below. Any
  # 1.x release works; we pin the floor so CI's mypy is predictable.
  "mypy>=1.8",
]
# v0.6.0 §B.2 / §A6: OAuth 2.1 + PKCE + RFC 8707 streamable-http stack.
# python-jose retained per owner amendment §A6.
mcp-auth = [
  "python-jose>=3.5",
  "authlib>=1.3",
  "cryptography>=42",
]
# v0.6.0 §A.1: MCP resources subscription file-watching. watchfiles
# is the lightest-weight cross-platform inotify wrapper.
mcp-resources = [
  "watchfiles>=0.21",
]
# v0.7.10: ``pip install 'myco[examples]'`` — pulls in every framework
# the 8-demo subtree under ``examples/`` exercises. Used by
# ``tests/integration/examples/test_examples_smoke.py`` to flip the
# import-cleanly skips into real coverage. Each entry corresponds 1:1
# to a demo directory; see each demo's README.md for the canonical
# install command (kept in lockstep with this list). PraisonAI lives
# under the ``praisonaiagents`` distribution, not ``praisonai``;
# Microsoft's framework is published as ``agent-framework``. None of
# these names are PyPI placeholders — every one is a live package as
# of v0.7.10. We intentionally don't pin floors here: framework
# releases move fast and the demos exercise only stable surfaces
# (MCP adapters), so floor-bumping every cycle is churn for no
# correctness gain.
examples = [
  "agno",
  "claude-agent-sdk",
  "crewai[tools]",
  "dspy",
  "langgraph",
  "langchain-mcp-adapters",
  "agent-framework",
  "praisonaiagents",
  "smolagents",
]
# v0.8.0: ``pip install 'myco[multimedia]'`` — pulls in the audio /
# image-OCR / video-frame transitive closure so the three v0.8.0
# multimedia adapters (audio.py, image_ocr.py, video_frames.py) can
# transcribe / OCR. Heavy footprint (~500 MB once PyTorch + Whisper
# weights land), so it's strictly opt-in: the default install stays
# lean and the adapters register-but-emit-failed-stubs when the
# extras are absent (lazy-import architecture; module import stays
# stdlib-only). Floors:
#   * openai-whisper >= 20240930 — last release before the ``base``-
#     model checksum changes; older floors download stale weights.
#   * pytesseract >= 0.3.10 — first release with the
#     TesseractNotFoundError public alias the image-OCR adapter
#     catches.
#   * opencv-python-headless >= 4.10.0.84 — headless variant avoids
#     the GUI-toolkit dep (Qt/GTK) so ``pip install`` stays clean
#     on CI containers; 4.10.x is the LTS line as of v0.8.0.
#   * Pillow >= 10.0.0 — the security-fix line; older 9.x has CVE-
#     2023-44271 (DoS) and the operator should never land on it.
# The extra also pulls PyTorch transitively via openai-whisper —
# that's the ~500 MB piece. Note for users on resource-constrained
# CI: skip ``[multimedia]`` and the three adapters cleanly emit
# install-extras failed-stubs for any audio/image/video file forage
# encounters, so default-install paths are never silently broken.
multimedia = [
  "openai-whisper >= 20240930",
  "pytesseract >= 0.3.10",
  "opencv-python-headless >= 4.10.0.84",
  "Pillow >= 10.0.0",
]

[project.scripts]
# Three stable PATH-level entry points so `.mcp.json` and hook configs
# never have to reason about the user's venv or whether `python` vs
# `python3` is the right alias.
#
#   myco              the manifest-driven CLI (20 verbs since v0.6.0:
#                     19 agent + 1 human-facing `brief`).
#   mcp-server-myco   the MCP stdio/sse launcher; follows the
#                     community `mcp-server-<name>` convention so
#                     tools like uvx, pipx, and the MCP Registry
#                     can pick it up without configuration.
#   myco-install      zero-copy-paste install into any of ten MCP
#                       hosts (Claude Code, Claude Desktop, Cursor,
#                       Windsurf, Zed, VS Code, OpenClaw, Gemini CLI,
#                       Codex CLI, Goose). Writes the correct schema
#                       per host (JSON / TOML / YAML); idempotent.
myco = "myco.boundary.surface.cli:main"
mcp-server-myco = "myco.boundary.mcp:main"
myco-install = "myco.boundary.install:main"

# v0.5 (MAJOR 6) — dimension registration via entry-points.
#
# Myco's own built-in dimensions register here, the same way a third-
# party substrate plugin would. `default_registry()` discovers this
# table at runtime via `importlib.metadata.entry_points(group=
# "myco.dimensions")`. Adding a dimension means: write the class, add
# a row here, run `pip install -e .` (installed users get it
# automatically on next `pip install`). No edit to
# `src/myco/homeostasis/dimensions/__init__.py`'s `_BUILT_IN` tuple is
# strictly required after v0.5 — the tuple is the dev-checkout
# fallback, not the SSoT.
#
# Third-party dimension packages follow the same shape:
#
#   [project.entry-points."myco.dimensions"]
#   my_id = "mypkg.lint:MyDimensionClass"
[project.entry-points."myco.dimensions"]
M1 = "myco.homeostasis.dimensions.mechanical.m1_canon_identity_fields:M1CanonIdentityFields"
M2 = "myco.homeostasis.dimensions.mechanical.m2_entry_point_exists:M2EntryPointExists"
