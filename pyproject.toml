# v0.6.0 additions (21 new dims; severity-promotion ledger applies via _canon.yaml::lint.severity_promotion):
PA2 = "myco.homeostasis.dimensions.mechanical.pa2_megafile_loc_cap:PA2MegafileLocCap"
