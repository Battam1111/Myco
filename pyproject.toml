SH1 = "myco.homeostasis.dimensions.shipped.sh1_package_version_ref:SH1PackageVersionRef"
MB1 = "myco.homeostasis.dimensions.metabolic.mb1_raw_notes_backlog:MB1RawNotesBacklog"
MB2 = "myco.homeostasis.dimensions.metabolic.mb2_no_integrated_yet:MB2NoIntegratedYet"
SE1 = "myco.homeostasis.dimensions.semantic.se1_dangling_refs:SE1DanglingRefs"
SE2 = "myco.homeostasis.dimensions.semantic.se2_orphan_integrated:SE2OrphanIntegrated"
# v0.5.8 additions (Phase 14 of the v0.5.8 cleanup):
MP2 = "myco.homeostasis.dimensions.mechanical.mp2_plugin_provider_imports:MP2PluginProviderImports"
DC1 = "myco.homeostasis.dimensions.mechanical.dc1_module_docstring:DC1ModuleDocstring"
