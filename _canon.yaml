system:
  principles_count: 12
  principles_label: 十二原则
  entry_point: MYCO.md
  # --- Upstream Protocol v1.0 (contract version lock) ---
  # Authoritative source: docs/agent_protocol.md §8
  # Craft record:         docs/primordia/upstream_protocol_craft_2026-04-11.md
  # Changelog:             docs/contract_changelog.md
  contract_version: "v0.44.0"  # Wave A2: molt deprecated, MCP dispatch cleaned
  synced_contract_version: "v0.44.0"  # Wave A2 — self-reference
  upstream_scan_last_run: "2026-04-11T15:21:31Z"

  # --- Upstream scan staleness reader (Wave 17, contract v0.16.0) ---
  # Feeds detect_upstream_scan_stale() in src/myco/notes.py. Fires
  # HIGH if stale AND bundles pending in .myco_upstream_inbox/,
  # MEDIUM if stale AND no bundles, silent otherwise.
  # Closes Wave 13 A7 split's reader half (Wave 16 landed the writer).
  upstream_scan:
    stale_days: 7              # default: scan older than 7d is stale
    enabled: true              # hunger channel toggle

  # --- Boot Brief Injector (Wave 17, contract v0.16.0) --------------
  # See docs/primordia/boot_brief_injector_craft_2026-04-11.md.
  # Writes .myco_state/boot_brief.md + patches entry point file's
  # signals block on every successful `myco hunger` invocation.
  boot_brief:
    enabled: true
    brief_path: ".myco_state/boot_brief.md"   # cache file
    sentinel_begin: "<!-- MYCO-BOOT-SIGNALS:BEGIN"  # regex prefix
    sentinel_end: "<!-- MYCO-BOOT-SIGNALS:END -->"
    # Signals included in the condensed MYCO.md / CLAUDE.md block.
    # Order = display order. Missing signals are omitted silently.
    priority_signals:
      - contract_drift
      - raw_backlog
      - upstream_scan_stale
      - craft_reflex_missing
      - session_end_drift
      - compression_pressure   # Wave 50 (v0.39.0)

  # --- Self-Correction Contract (Wave 19, contract v0.18.0) --------------
  # Hard Contract rule #3 special clause declarative form. The `myco
  # correct` CLI shortcut force-merges these tags onto the note; manual
  # `myco eat` should also apply this exact pair when the condition
  # applies. Canon entry exists so future waves can reference the set
  # without hard-coding.
  # Craft of record:
  #   docs/primordia/myco_correct_shortcut_craft_2026-04-11.md
  self_correction:
    mandatory_tags:
      - friction-phase2
      - on-self-correction

  # --- Boot Reflex Arc (Wave 13, contract v0.12.0) ------------------------
  # Authoritative craft: docs/primordia/boot_reflex_arc_craft_2026-04-11.md
  # Parent principles: W1 (autopilot) + Upstream Protocol v1.0 §8.4
  # Symmetric to Wave 12 craft reflex: HIGH severity, in-session remedy.
  #
  # Three reflexes closed:
  #   (1) contract_drift   — local synced_contract_version ≠ kernel contract_version
  #   (2) raw_backlog HIGH — W1 violation when pure-raw count > threshold
  #   (3) boot hunger wiring — myco_status surfaces reflex signals on invocation
  #
  # `[REFLEX HIGH]` prefix distinguishes reflex signals from advisory ones.
  boot_reflex:
    enabled: true
    severity: HIGH
    raw_backlog_threshold: 10
    reflex_prefix: "[REFLEX HIGH]"
    # raw_backlog counts only pure-raw notes: digest_count == 0 AND
    # source != "bootstrap". digesting-state notes are held, not raw.
    raw_exempt_sources:
      - bootstrap
    # Wave 20 (v0.19.0): grandfather exemption lapses after this many
    # minor versions of drift, irrespective of `enabled`. Set to a large
    # number (e.g. 99) to disable the ceiling; set to 0 for strict
    # lockstep mode (any drift fires HIGH). Major-version mismatches are
    # NEVER grandfathered. See
    # docs/primordia/silent_fail_elimination_craft_2026-04-11.md.
    grandfather_ceiling_minor_versions: 5

  # --- Session End Reflex Arc (Wave 14, contract v0.13.0) ----------------
  # Authoritative craft: docs/primordia/session_end_reflex_arc_craft_2026-04-11.md
  # Parent principle: W5 (continuous evolution) / Gear 2 + Gear 4 rituals.
  # Sibling to boot_reflex. DELIBERATELY LOW severity — W5 is a drive
  # (habit decay), not W1-class constraint (data loss). Signal appears in
  # hunger advisory list, does not block task work. See craft §B4.
  #
  # Two drift detectors bundled:
  #   gear2 — "N log entries since last `## [YYYY-MM-DD] meta |` line".
  #           Proxy for "did you reflect at all today?". Default threshold
  #           15 ≈ one active kernel day.
  #   gear4 — "oldest `g4-candidate` entry older than K days without
  #           resolution marker (`g4-pass` inline or craft file on disk)".
  #           Drives Gear 4 sweep discipline.
  session_end_reflex:
    enabled: true
    severity: LOW                       # asymmetric with boot_reflex HIGH
    log_scan_cap_bytes: 5242880         # 5 MB — constant-bound scan (C2)
    gear2:
      enabled: true
      drift_threshold_entries: 15
      reflection_marker: meta           # token after `[YYYY-MM-DD]`
    gear4:
      enabled: true
      drift_threshold_days: 5
      candidate_marker: g4-candidate
      resolution_markers:
        - g4-pass
        - g4-landed
        - g4-resolved

  upstream_channels:
    # Path-based classification — strictest-class-wins. An instance agent
    # MUST map any proposed upstream change to one of these classes by path
    # and MUST NOT self-escalate. Class Z is the hardest gate.
    class_x:            # Auto-mergeable (examples / notes / append-only log)
    - log.md
    - notes/**
    - examples/**
    class_y:            # Inline-confirm (docs / wiki prose)
    - wiki/**
    - docs/**           # except docs/agent_protocol.md (see class_z)
    class_z:            # Review-required (contract / lint / templates / canon)
    - docs/agent_protocol.md
    - docs/craft_protocol.md
    - scripts/lint_knowledge.py
    - src/myco/lint.py
    - src/myco/mcp_server.py
    - src/myco/upstream.py    # v0.9.0 — kernel absorb module
    - _canon.yaml
    - src/myco/templates/**
    - forage/_index.yaml      # v1.7.0 — forage manifest is discipline surface

  # --- Upstream Protocol v0.9.0 (absorb impl) ---
  # Debate: docs/primordia/upstream_absorb_craft_2026-04-11.md
  # Kernel side receiving dock: .myco_upstream_inbox/ (L11 dotdir-exempt).
  # CLI verbs:   myco upstream {scan, absorb, ingest}
  # Bundle flow: instance outbox → absorb → kernel inbox → ingest → pointer
  #              note (source: upstream_absorbed) + evidence archive.
  upstream_absorb:
    kernel_inbox_dir: .myco_upstream_inbox
    absorbed_subdir: absorbed
    bundle_filename_pattern: '^n_\d{8}T\d{6}_[0-9a-f]+\.bundle\.(yaml|yml|json)$'
    kernel_bundle_filename_pattern: '^\d{8}T\d{6}_n_\d{8}T\d{6}_[0-9a-f]+\.bundle\.(yaml|yml|json)$'
    pointer_note_source: upstream_absorbed
    batch_ingest_cap: 10       # max bundles per single ingest invocation

  # --- Craft Protocol v1 (W3) ---
  # Authoritative spec:    docs/craft_protocol.md
  # Bound principle:       W3 (docs/WORKFLOW.md)
  # Debate of record:      docs/primordia/craft_formalization_craft_2026-04-11.md
  # Lint of record:        L13 Craft Protocol Schema
  craft_protocol:
    version: 1
    dir: docs/primordia
    # Topic must have >= 2 underscore-separated tokens; optional 4-hex
    # suffix resolves same-day collisions.
    filename_pattern: '^[a-z][a-z0-9]*(_[a-z0-9]+){1,}_craft_\d{4}-\d{2}-\d{2}(_[0-9a-f]{4})?\.md$'
    required_frontmatter:
    - type                    # must equal "craft"
    - status                  # from valid_statuses
    - created                 # ISO date
    - target_confidence       # float in [0,1]
    - current_confidence      # float in [0,1]
    - rounds                  # int >= min_rounds
    - craft_protocol_version  # int; v1 files MUST have this = 1
    - decision_class          # key of confidence_targets_by_class
    valid_statuses:
    - DRAFT                   # writing in progress; < min_rounds completed
    - ACTIVE                  # >= min_rounds; conclusion citable
    - COMPILED                # extracted into permanent location
    - SUPERSEDED              # replaced by newer craft
    - LOCAL                   # gitignored local experiment, excluded from lint
    min_rounds: 2
    confidence_targets_by_class:
      kernel_contract: 0.90   # agent_protocol / lint / canon / templates / mcp_server
      instance_contract: 0.85 # per-project architectural decisions
      exploration: 0.75       # tentative designs / naming / open research
    stale_active_threshold_days: 30
    grandfather_rule: "Files lacking craft_protocol_version are exempt from L13 strict checks."
    # --- Body schema (Wave 15, contract v0.14.0) ---
    # Partial closure of docs/craft_protocol.md §7 #3 ("body structure is
    # not linted"). Attack-depth scoring (§7 #5) remains open. L13 now
    # verifies:
    #   HIGH  — body_chars < declared_rounds * min_body_chars_per_round
    #   HIGH  — 0 < body_rounds < declared_rounds (declaration lie)
    #   MEDIUM — body_rounds == 0 && declared_rounds > 0 (nudge)
    #   MEDIUM — per-round slice chars < min_round_body_chars
    # round_markers is a regex list scanned on top-level `^## ` headings
    # only. First capture group is the round number; unique numbers are
    # counted across all patterns. See Wave 15 craft §A2.
    # Authoritative craft: docs/primordia/l13_body_schema_craft_2026-04-11.md
    body_schema:
      enabled: true
      min_body_chars_per_round: 200
      min_round_body_chars: 150
      round_markers:
        - 'Round\s+(\d+)'
        - 'R(\d+)\b'
        - '第\s*([一二三四五六七八九十\d]+)\s*轮'
        - 'ラウンド\s*(\d+)'
      # Per-file body-check exemption list (instance-local; kernel
      # bootstrap is empty — pre_release_rebaseline gets the MEDIUM
      # nudge rather than silent exemption, per craft §4 D4).
      exempt_files: []
    # --- Craft Reflex (contract v0.10.0, Wave 11) ---
    # Authoritative debate: docs/primordia/craft_reflex_craft_2026-04-11.md
    # Lint of record:       L15 Craft Reflex
    # Hunger signal:        craft_reflex_missing
    # Problem solved: the discovery surface for craft was passive — trigger
    # conditions (kernel contract change / public-claim rewrite) could fire
    # without the agent ever recalling craft exists. Reflex converts those
    # trigger surfaces into an active check: if a file on a listed surface
    # was touched recently and no craft evidence appears in the same window,
    # a LOW signal is emitted (non-blocking; craft is still a human ritual,
    # we are only refusing silent bypass).
    reflex:
      enabled: true
      lookback_days: 3
      # Wave 12 (v0.11.0): severity bumped LOW → HIGH. The reflex is now
      # an immutable arc, not an advisory signal. Agent's obligation on
      # fire: write the missing craft in-session before any other
      # kernel-class action. Bypassing via `--no-verify` is a W3 violation.
      # See docs/primordia/craft_autonomy_craft_2026-04-11.md §4.1 D1.
      severity: HIGH
      # Wave 12: trivial-edit exemption. A trigger-surface touch whose
      # diff is ≤ this many lines AND does not add new identifiers is
      # exempt from reflex firing (whitespace fix / import reorder).
      # Git is invoked via try/except; if unavailable, fall back to
      # NOT exempt (fail-closed — when in doubt, fire).
      trivial_exempt_lines: 20
      trigger_surfaces:
        # Class 1: kernel contract surfaces — touching any of these is a
        # Trigger #1 per craft_protocol.md §3.
        kernel_contract:
        - docs/agent_protocol.md
        - docs/craft_protocol.md
        - docs/contract_changelog.md   # Wave 18 (v0.17.0): authoritative ledger
        - _canon.yaml
        - src/myco/lint.py
        - src/myco/mcp_server.py
        - src/myco/notes.py             # Wave 18 (v0.17.0): hunger/detect/write logic
        - src/myco/notes_cmd.py         # Wave 18 (v0.17.0): CLI plumbing
        - src/myco/templates/_canon.yaml
        - src/myco/templates/MYCO.md
        # Class 2: public-claim surfaces — rewriting any of these is a
        # Trigger #4 (external stakeholder-visible claim). Wave 10 README
        # rewrite walked past craft precisely because this class did not
        # exist yet; its absence is the direct motivating failure.
        public_claim:
        - README.md
        - README_zh.md
        - README_ja.md
        - MYCO.md
        - docs/vision.md
      # Auxiliary evidence pattern scanned in log.md within the same window.
      # Primary detection is file mtime on the surfaces above; this regex
      # is only used to avoid false positives when a surface was touched
      # AS PART OF landing a craft conclusion.
      evidence_pattern: '(docs/primordia/[a-z0-9_]+_craft_\d{4}-\d{2}-\d{2}(_[0-9a-f]{4})?\.md|craft_reference\s*:)'

  # --- Skill Evolution (Wave E2) ---
  # Opt-in: disabled by default. When enabled, the metabolic cycle can
  # auto-evolve skills based on session performance data.
  # Myco provides scaffolding (evolve.py); Agent provides intelligence (llm_fn).
  evolution:
    enabled: false                    # opt-in; set true when ready
    skill_success_threshold: 0.7      # below this → trigger mutation
    min_sessions_before_evolve: 5     # wait for data before evolving
    max_mutations_per_cycle: 1        # prevent runaway evolution
    require_git_clean: true           # don't evolve on dirty tree

  # --- Vertical Traceability Index (Wave 56) ---
  # Agent navigation map: when ANY layer changes, read this index to find
  # the full impact path across Story→Vision→Contract→Verification→Code.
  # NOT a lint dimension — this is for Agent judgment. Lint is dead code
  # that catches mechanical errors; the Agent uses this map to catch
  # conceptual drift with its own intelligence.
  # Authoritative design: five-level refinement model (Wave 55 session).
  traceability:
    anchors:
      symbiont:                      # Anchor #1: Agent-Substrate 共生体
        story: "MYCO.md:§身份锚点:1"
        vision: ["docs/vision.md:§一"]
        contract: ["_canon.yaml::architecture", "docs/agent_protocol.md:§0.5"]
        lint: [L1, L4, L11]
        code: [cli.py, mcp_server.py, init_cmd.py]
      non_parametric:                # Anchor #2: 非参数进化
        story: "MYCO.md:§身份锚点:2"
        vision: ["docs/vision.md:§九"]
        contract: []
        lint: []
        code: []
      autonomous_pipeline:           # Anchor #3: 自主代谢管道
        story: "MYCO.md:§身份锚点:3"
        vision: ["docs/vision.md:§三"]
        contract: ["_canon.yaml::notes_schema", "docs/agent_protocol.md:§2.2,§3,§4"]
        lint: [L10, L18, L22]
        code: [notes.py, notes_cmd.py, compress_cmd.py, inlet_cmd.py]
        hunger: [raw_backlog, stale_raw, compression_ripe, compression_pressure]
      compression_cognition:         # Anchor #4: 压缩即认知
        story: "MYCO.md:§身份锚点:4"
        vision: ["docs/vision.md:§三"]
        contract: ["_canon.yaml::notes_schema.compression"]
        lint: [L18]
        code: [compress_cmd.py, cohorts.py]
        hunger: [compression_ripe, compression_pressure]
      self_model:                    # Anchor #5: 四层自我模型
        story: "MYCO.md:§身份锚点:5"
        vision: ["docs/vision.md:§三"]
        contract: ["_canon.yaml::notes_schema.dead_knowledge_threshold_days"]
        lint: [L10]
        code: [notes.py, graph.py, sessions.py]
        hunger: [dead_knowledge, graph_orphans, session_index_missing]
      internalized_selection:        # Anchor #6: 内化的变异-选择
        story: "MYCO.md:§身份锚点:6"
        vision: ["docs/vision.md:§二:C2", "docs/vision.md:§五"]
        contract: ["_canon.yaml::boot_reflex", "docs/agent_protocol.md:§7"]
        lint: [L0-L22]              # lint IS the selection mechanism
        code: [lint.py, "notes.py::compute_hunger_report"]
        hunger: [contract_drift, craft_reflex_missing]
      theoretical_lineage:           # Anchor #7: 理论血统
        story: "MYCO.md:§身份锚点:7"
        vision: ["docs/vision.md:§六"]
        contract: []
        lint: []
        code: []
      permanence_anchors:            # Anchor #8: 永久锚点文档
        story: "MYCO.md:§身份锚点:8"
        vision: []
        contract: ["_canon.yaml::craft_protocol"]
        lint: [L13, L15]
        code: []

  # --- Structural Limits (contract v1.5.0) ---
  # Authoritative spec:    docs/biomimetic_map.md §4
  # Debate of record:      docs/primordia/biomimetic_restructure_craft_2026-04-11.md
  # Signal of record:      hunger signal `structural_bloat`
  # Seeded (not adaptive): fixed thresholds; adaptive threshold is future work
  #                        登记在 docs/open_problems.md §4 的压缩工程延伸.
  structural_limits:
    # Soft limit on non-contract top-level docs/*.md files.
    # Contract-level docs listed in exclude_paths are not counted in the
    # denominator, so this counts "pressure from working documents".
    docs_top_level_soft_limit: 20
    # Soft limit on docs/primordia/*.md files. Primordia is expected to
    # churn — crafts are born ACTIVE then transition to COMPILED /
    # SUPERSEDED / LOCAL. Exceeding this limit is a signal that compression
    # (COMPILED → wiki + git history pointer) is overdue.
    #
    # Wave 36 re-baseline (v0.28.0): 40 → 60. Wave 22 §B7 R2.4 explicitly
    # anticipated this exit: "If creation velocity ever exceeds compression
    # (e.g., wave 30+ where everything is still active), that's a real signal
    # — probably time to raise the soft limit." We are at Wave 36 with 47
    # ACTIVE crafts that all remain load-bearing for current doctrine and
    # impl modules. The 40 baseline was set when the substrate had ~25
    # crafts (Wave 22). Two waves of attempted archive sweeps (Wave 22 +
    # this Wave 36 audit) found that post-Wave-22 design crafts are heavily
    # cited from impl crafts, canon comments, and code modules — archiving
    # them would force 30+ link updates including immutable historical
    # notes. Re-baselining to 60 is the honest response: leaves headroom
    # of ~13 for next ~7 waves at avg 2 crafts/wave, then re-evaluate.
    # Authoritative craft: docs/primordia/primordia_soft_limit_rebaseline_craft_2026-04-12.md
    primordia_soft_limit: 60
    # Contract-level docs that carry structural authority — these are not
    # "bloat", they are load-bearing rhizomorphs. Excluded from the docs/
    # top-level count.
    exclude_paths:
    - docs/agent_protocol.md
    - docs/craft_protocol.md
    - docs/contract_changelog.md
    - docs/biomimetic_map.md
    - docs/WORKFLOW.md
    - docs/vision.md
    - docs/theory.md
    - docs/architecture.md
    - docs/open_problems.md
    - docs/evolution_engine.md

  wiki_page_types:
  - entity
  - concept
  - operations
  - analysis
  - craft
  evolution_gears: 4
  myco_md_max_lines: 300
  stale_patterns:
  - 五原则
  - 六原则
  - 七原则
  # Note: "v0.8" was in this list as a pre-v1.0 stale tag when Myco was
  # briefly at v0.9.0 → 1.0. Wave 8 pre-release re-baseline restored v0.x
  # as the current family (see docs/contract_changelog.md top banner), so
  # the legacy anti-pattern was removed. If you need to detect future
  # stale version tags, re-add them here by exact substring.
  vision_anchors:
    # Machine-readable identity anchors — any drop below threshold in
    # README.md / README_zh.md / MYCO.md triggers L9 vision-drift alert.
    # Authoritative source: docs/primordia/vision_recovery_craft_2026-04-10.md
    # §7 Machine-Readable Anchor Terms.
    min_hits_per_file: 1
    targets:
    - README.md
    - README_zh.md
    - README_ja.md
    - MYCO.md
    # Each group = one identity element. A file passes the group if ANY
    # variant appears at least min_hits_per_file times. Groups are OR-ed
    # internally, AND-ed across groups.
    groups:
    - name: substrate-identity
      any_of: ["substrate", "基质", "Substrate", "基質"]
    - name: cpu-metaphor
      any_of: ["CPU", "operating system", "OS upgrades", "自升级", "OS ", "自己升級", "自己升级"]
    - name: non-parametric
      any_of: ["non-parametric", "Non-parametric", "非参数", "weights are touched", "weights never", "权重永不", "非参数的", "重みは"]
    - name: metabolism
      any_of: ["metabolism", "metabolize", "Metabolic", "代谢", "消化系统", "代謝", "消化系"]
    - name: seven-step-pipeline
      any_of: ["excrete", "淘汰", "seven-step", "七步", "排出", "七段"]
    - name: compression-doctrine
      any_of: ["Compression", "compression", "压缩", "attention is not", "注意力有限", "圧縮", "注意力は"]
    - name: four-layer-self-model
      any_of: ["self-model", "Self-Model", "四层自我", "Inventory", "库存", "decay", "退化"]
    - name: mutation-selection
      any_of: ["mutation", "selection", "变异", "选择压力", "Mutation", "選択圧", "選擇壓"]
    - name: perpetual-evolution
      any_of: ["Perpetual", "perpetual", "Stagnation", "stagnation", "永恒进化", "停滞即死", "永続", "停滞"]
    - name: transparency-anticancer
      any_of: ["Transparent", "transparent", "透明", "cancerous", "癌变", "癌化"]
    - name: kernel-instance
      any_of: ["kernel", "instance", "内核", "实例", "カーネル", "インスタンス"]
    - name: theoretical-lineage
      any_of: ["Karpathy", "Polanyi", "Argyris", "PDCA", "Voyager", "理论血统", "ポラニー", "アージリス"]
  notes_schema:
    # Digestive substrate — the four-command set (eat / digest / view /
    # hunger) reads and writes notes here. Authoritative design record:
    # docs/primordia/digestive_architecture_craft_2026-04-10.md
    dir: notes
    filename_pattern: '^n_\d{8}T\d{6}_[0-9a-f]{4}\.md$'
    required_fields:
    - id
    - status
    - source
    - tags
    - created
    - last_touched
    - digest_count
    - promote_candidate
    - excrete_reason
    # Optional fields (v1.4.0+) — not enforced by L10, but documented here
    # as SSoT so downstream readers can discover them. See
    # docs/primordia/dead_knowledge_seed_craft_2026-04-11.md and
    # docs/primordia/compression_primitive_craft_2026-04-12.md (Wave 27 D4).
    optional_fields:
    - view_count              # int, default 0; incremented by `myco view <id>` single-note mode
    - last_viewed_at          # ISO str or null; set by `myco view <id>` single-note mode
    # Wave 30 (v0.26.0) — forward-compression audit trail.
    - compressed_from         # list[str]: ids of input notes (set on output extracted note)
    - compressed_into         # str: id of output note (set on excreted input notes)
    - compression_method      # str: "manual" | "hunger-signal"
    - compression_rationale   # str: required prose explaining what was preserved/dropped
    - compression_confidence  # float: 0.0–1.0, self-reported
    - pre_compression_status  # str: input's status before excretion (for future uncompress)
    # Wave 35 (v0.27.0) — Metabolic Inlet provenance scaffold.
    # Soft-enforced by L10 for source=inlet only (warn, not error).
    # Authoritative design: docs/primordia/metabolic_inlet_design_craft_2026-04-12.md
    # Implementation craft: docs/primordia/inlet_mvp_craft_2026-04-12.md
    - inlet_origin            # str: URL or absolute file path of external source
    - inlet_method            # str: "file" | "url-fetched-by-agent" | "explicit-content"
    - inlet_fetched_at        # str: ISO-8601 timestamp content was captured
    - inlet_content_hash      # str: sha256 hex digest of body bytes (tamper detection)
    valid_statuses:
    - raw            # just ingested, not yet processed
    - digesting      # being read / summarized / extracted
    - extracted      # key claim lifted into wiki or MYCO.md
    - integrated     # fully merged into canonical structures
    - excreted       # removed from active rotation (must cite reason)
    # Self-Model D layer seed (v1.4.0) — dead knowledge detection.
    # See docs/primordia/dead_knowledge_seed_craft_2026-04-11.md.
    terminal_statuses:       # statuses considered "settled", eligible for dead detection
    - extracted
    - integrated
    dead_knowledge_threshold_days: 30
    valid_sources:
    - chat                # pulled from conversation context
    - eat                 # user/agent invoked `myco eat` explicitly
    - promote             # grown from another note
    - import              # bulk ingested from external tool
    - bootstrap           # created during myco init / first-run scaffolding
    - forage              # v0.7.0 — digested extract from a forage/ item
    - upstream_absorbed   # v0.9.0 — pointer note from myco upstream ingest;
                          # body + evidence file in .myco_upstream_inbox/absorbed/
    - compress            # v0.26.0 (Wave 30) — extracted note produced by
                          # `myco compress` from N raw/digesting inputs.
                          # Carries `compressed_from` audit trail.
    - inlet               # v0.27.0 (Wave 35) — raw note produced by
                          # `myco inlet` from external content (file or
                          # agent-fetched URL). Carries `inlet_*` provenance
                          # fields. Wave 34 design craft establishes the
                          # scaffold; the verb defers all 4 open_problems
                          # §1-4 sub-problems to its operator.

    # Wave 30 (v0.26.0) — forward-compression configuration.
    # Authoritative design: docs/primordia/compression_primitive_craft_2026-04-12.md
    # The hunger signal `compression_ripe` (Wave 27 D2) fires when a tag
    # cohort has ≥`ripe_threshold` raw notes AND the oldest is ≥`ripe_age_days`
    # old. The signal is non-blocking advisory; agents act on it via
    # `myco compress --tag <X>` or ignore it.
    compression:
      ripe_threshold: 5
      ripe_age_days: 7
      pressure_threshold: 2.0    # Wave 50: fires when (raw+digesting)/(extracted+integrated) > this
      gap_stale_days: 14         # Wave 59: cohort_staleness fires for unprocessed gaps older than this

    # Wave 35 (v0.27.0) — Metabolic Inlet primitive scaffold.
    # Authoritative design: docs/primordia/metabolic_inlet_design_craft_2026-04-12.md
    # Implementation craft: docs/primordia/inlet_mvp_craft_2026-04-12.md
    # The verb is operator-deferred for all 4 open_problems §1-4 sub-problems
    # (cold start, trigger signals, alignment, continuous compression).
    # Default tag is applied automatically when --tags is not provided so
    # the existing `myco compress --tag inlet` chain can act on accumulated
    # inlet outputs without operators having to remember the convention.
    inlet:
      default_tag: "inlet"

  # --- Inlet Triggers (Wave 49, contract v0.38.0) ---
  # Closes open_problems §2 (Metabolic Inlet Trigger Signals).
  # detect_inlet_trigger() in notes.py reads these thresholds.
  # Two trigger conditions: search miss accumulation + cohort gaps.
  inlet_triggers:
    enabled: true
    search_miss_threshold: 5     # ≥5 zero-result searches → inlet_ripe
    gap_threshold: 3             # ≥3 notes in unprocessed domain → inlet_ripe
    miss_state_file: ".myco_state/search_misses.yaml"

  # --- Forage Substrate (contract v1.7.0) ---
  # External reference material intake — the exoenzyme / foraging phase
  # of fungal metabolism. Authoritative spec: docs/agent_protocol.md §8.9
  # (inbound channel classification). Debate of record:
  # docs/primordia/forage_substrate_craft_2026-04-11.md (kernel_contract,
  # 2 rounds, 0.92 confidence). Biomimetic mapping:
  # docs/biomimetic_map.md §2 — this is the FIRST directory whose biological
  # name is justified by information gain from day one.
  #
  # Discipline: forage/ is transient. Items enter raw, must be digested
  # into notes/ (producing digest_target), then absorbed once the digest
  # note reaches extracted/integrated, then eventually discarded. No
  # permanent storage — the compression doctrine has teeth here.
  forage_schema:
    dir: forage
    index_file: forage/_index.yaml
    # ID convention — mirrors notes/ pattern (n_…) with f_ prefix.
    filename_pattern: '^f_\d{8}T\d{6}_[0-9a-f]{4}$'
    required_item_fields:
    - id
    - source_url
    - source_type
    - local_path
    - acquired_at
    - status
    - license                # REQUIRED. "unknown" allowed but forces quarantined.
    - size_bytes
    optional_item_fields:
    - license_restrictions   # list of strings, e.g. ["no-redistribute"]
    - license_checked_at     # ISO date, defaults to acquired_at
    - digest_target          # list of note ids produced from this item
    - notes                  # human annotation
    - why                    # intent statement from `myco forage add --why`
    valid_source_types:
    - paper                  # PDF, arxiv, markdown paper
    - repo                   # git clone
    - article                # blog post, HN thread, discussion → .md
    - other                  # catch-all; triggers L14 LOW reminder
    valid_statuses:
    - raw                    # just acquired
    - digesting              # agent actively extracting
    - digested               # note(s) produced, digest_target non-empty
    - absorbed               # digest note(s) reached extracted/integrated
    - discarded              # explicitly removed
    - quarantined            # failed license check / lint, needs review
    # Seeded thresholds — not adaptive. Future work in open_problems §4.
    max_item_size_bytes: 10485760        # 10 MB soft cap per item
    forage_backlog_threshold: 5          # ≥5 raw items triggers hunger
    stale_raw_days: 14                   # raw > 14 days triggers hunger
    total_budget_bytes: 209715200        # 200 MB soft total budget (hunger)
    hard_budget_bytes: 1073741824        # 1 GB hard limit (L14 HIGH)
    license_recheck_days: 90             # stale license reminder threshold

  # --- Test Infrastructure (Wave 25, contract v0.24.0) ------------------
  # Authoritative craft: docs/primordia/hermes_absorption_craft_2026-04-12.md
  # (kernel_contract, 3 rounds, 0.90 confidence). Seeded from the hermes
  # absorption catalog C1 (test infrastructure with autouse isolation
  # fixture) — the one absorption item grounded in 3 of Myco's 5 most
  # recent scars (W20 silent-fail, W23 pre-commit never-exercised,
  # W24 two-sensor disagreement) per craft §3.3.
  #
  # SSoT for:
  #   - pyproject.toml::[tool.pytest.ini_options]::testpaths
  #   - scripts/install_git_hooks.sh::MYCO_PRECOMMIT_PYTEST gate
  #   - tests/conftest.py::_isolate_myco_project fixture expectations
  #
  # `test_dir` is read by the pre-commit hook so both surfaces share one
  # truth; bare `pytest tests/` is the developer-facing invocation.
  tests:
    test_dir: tests/
    min_unit_tests: 4               # Wave 25 seed count (catch regressions)
    integration_marker: integration  # matches pyproject pytest markers
    unit_subdir: tests/unit/

  # --- Session Memory (Wave 52, contract v0.40.0) ---
  # FTS5 indexing of Claude Code conversation transcripts.
  # Absorbs hermes-agent session search pattern.
  sessions:
    enabled: true
    db_path: ".myco_state/sessions.db"
    claude_projects_dir: null    # auto-detect from ~/.claude/projects/
    max_age_days: 90

  write_surface:
    # L11 Write-Surface Lint — defines the only legal write targets for
    # any agent operating on this substrate. Anything outside this list
    # (and not covered by .gitignore) is CRITICAL. Authoritative contract:
    # docs/agent_protocol.md §1.
    #
    # Each entry is a path pattern (glob-ish, rooted at project root).
    # Trailing "/" means "this directory and anything under it".
    # "**" means recursive. Files matching an allowed pattern are legal.
    allowed:
    # --- Digestive substrate ---
    - notes/                 # via myco eat / digest ONLY
    - wiki/                  # structured knowledge (agent extract allowed)
    - forage/                # v1.7.0 — external material pre-digestion (see forage_schema)
    - skills/                # Wave 50 — operational procedure documents (metabolic-cycle etc.)
    - docs/                  # framework docs
    - log.md                 # append-only via myco_log
    - MYCO.md                # L1 index
    - _canon.yaml            # SSoT — human approval in practice
    # --- Code / packaging ---
    - src/                   # package source
    - scripts/               # CLI/lint scripts
    - tests/                 # test suite
    - examples/              # example projects (ASCC etc.)
    - assets/                # images / branding
    - dist/                  # build output (ephemeral; recreated by hatchling)
    # --- Standard repo files ---
    - README.md
    - README_zh.md
    - README_ja.md
    - LICENSE
    - CODE_OF_CONDUCT.md
    - CONTRIBUTING.md
    - SECURITY.md
    - pyproject.toml
    - .gitignore
    - .github/
    - .mcp.json
    - .agents/                   # Wave 55+: agent skills (PUA etc.)
    - skills-lock.json           # skills installer lockfile
    # --- Hard-forbidden top-level (even if created, L11 will flag) ---
    forbidden_top_level:
    - scratch.md
    - scratch.txt
    - notes.md
    - TODO.md
    - MEMO.md
    - memo.md
    - ideas.md
    - draft.md
    - summary.md
    - thoughts/
    - my_notes/
    - tmp/
    - temp/

  # --- Quantified Indicators (contract v0.8.0, Wave 8) ---
  # Schema-only. Current values live in MYCO.md "📊 指标面板" section.
  # Authoritative craft: docs/primordia/pre_release_rebaseline_craft_2026-04-11.md
  #
  # Rule: any number in the substrate that expresses progress / confidence /
  # maturity / saturation / pressure MUST live in [0.0, 1.0] and use one of
  # the approved suffixes below. Counts (e.g. principles_count) are exempt.
  # Handwritten bootstrap values MUST be ≤ 0.70 unless backed by an external
  # event (real PyPI release, lint pass, craft confidence, etc).
  indicators:
    range: [0.0, 1.0]
    bootstrap_ceiling_without_evidence: 0.70
    valid_suffixes:
    - _progress        # completion (0 unstarted → 1 fully achieved)
    - _confidence      # belief level (0 total doubt → 1 total trust)
    - _maturity        # stability (0 seedling → 1 release-ready)
    - _saturation      # fullness (0 empty → 1 at budget ceiling)
    - _pressure        # demand signal (0 relaxed → 1 critical)
    rationale_required: true      # every indicator must carry a rationale line
    stale_after_days: 90          # L15 future work will flag stale indicators
    authoritative_value_location: MYCO.md#指标面板
    history_location: log.md       # upward changes must cite wave milestone
    substrate_keys:
    # Canonical list of substrate-level indicator keys. MYCO.md dashboard
    # MUST contain every key in this list. Adding a new key = kernel_contract
    # class craft or higher.
    - v1_launch_progress
    - three_channel_maturity
    - lint_coverage_confidence
    - compression_discipline_maturity
    - identity_anchor_confidence
    - forage_backlog_pressure
    - notes_digestion_pressure
    - upstream_inbox_pressure   # v0.9.0 — pending bundles / ceiling(5);
                                # ceiling is bootstrap, pending friction data.
                                # Debate: docs/primordia/upstream_absorb_craft_2026-04-11.md
    upstream_inbox_ceiling: 5   # count at which pressure saturates to 1.0

