# _canon.yaml — Myco self-substrate, v0.4.0.
# Schema: docs/architecture/L1_CONTRACT/canon_schema.md
# Comments in this file are reserved for schema annotations only
# (per canon_schema.md rule 1). Narrative cross-references live under
# `_ref`-suffixed fields, not here.

schema_version: "1"
contract_version: "v0.5.16"
synced_contract_version: "v0.5.16"
identity:
  substrate_id: "myco-self"
  tags:
    - "myco"
    - "agent-substrate"
    - "python-package"
  entry_point: "MYCO.md"

system:
  write_surface:
    allowed:
      - "_canon.yaml"
      - "MYCO.md"
      - "CHANGELOG.md"
      - "README.md"
      - "pyproject.toml"
      - "notes/**"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - ".claude/**"
      # v0.4.1 plugin bundle (Stage D.3). Repo root doubles as a
      # Claude-Code / Cowork plugin so users can run
      # `/plugin marketplace add Battam1111/Myco` then
      # `/plugin install myco@myco`.
      - ".claude-plugin/**"
      - ".mcp.json"
      - "hooks/**"
      - "skills/**"
      # v0.5.11 MCP Registry onboarding (registry.modelcontextprotocol.io).
      # Declares package identifier / transport / PyPI pinning so clients
      # can discover + install Myco via the official registry. README also
      # carries an `<!-- mcp-name: io.github.battam1111/myco -->` sentinel
      # used by the registry to verify the PyPI package belongs to this
      # GitHub namespace.
      - "server.json"
      - "CITATION.cff"
      # v0.5.13 Dockerfile for Glama's OCI-based introspection check
      # and any MCP client that prefers OCI over pip/pipx. Carries
      # `io.modelcontextprotocol.server.name` label = `io.github.Battam1111/myco`
      # for OCI-registryType namespace verification.
      - "Dockerfile"
      - ".dockerignore"
  hard_contract:
    rules_ref: "docs/architecture/L1_CONTRACT/protocol.md"
    rule_count: 7
  # v0.5.6 (L0 principle 1 enforcement): declares whether this
  # substrate opts out of the "Agent calls LLM, substrate does
  # not" invariant. Default true. MP1 dimension cross-checks
  # against kernel scans.
  no_llm_in_substrate: true

versioning:
  package_version_ref: "src/myco/__init__.py"
  pyproject_dynamic: true

lint:
  categories:
    - mechanical
    - shipped
    - metabolic
    - semantic
  dimensions:
    # v0.5.0–v0.5.7 roster (11 dims):
    M1: mechanical
    M2: mechanical
    M3: mechanical
    MB1: metabolic
    MB2: metabolic
    MF1: mechanical
    MF2: mechanical
    MP1: mechanical
    SE1: semantic
    SE2: semantic
    SH1: shipped
    # v0.5.8 additions (14 new dims, Phase 14 of the v0.5.8 cleanup):
    MP2: mechanical  # plugin-tree companion to MP1 (LLM-SDK boundary)
    DC1: mechanical  # module docstring present
    DC2: mechanical  # public function/method docstring present
    DC3: mechanical  # public class docstring present
    DC4: mechanical  # non-trivial module references doctrine
    CS1: mechanical  # synced_contract_version matches contract_version
    FR1: mechanical  # fresh-substrate directory invariants
    PA1: mechanical  # write_surface covers core v0.5.x paths
    CG1: mechanical  # every L2 doctrine has a src code reference
    CG2: mechanical  # every src subpackage links out to doctrine
    DI1: mechanical  # discipline hooks present when .claude/ is declared
    MB3: metabolic   # raw-notes high watermark (≥50 pending)
    SE3: semantic    # graph contains no self-cycles
    RL1: semantic    # every R1-R7 rule is referenced somewhere
  exit_policy:
    default: "mechanical:critical,shipped:critical,metabolic:never,semantic:never"
  skeleton_downgrade:
    marker: ".myco_state/autoseeded.txt"
    affected_dimensions: []

subsystems:
  circulation:
    doc: "docs/architecture/L2_DOCTRINE/circulation.md"
    package: "src/myco/circulation/"
  digestion:
    doc: "docs/architecture/L2_DOCTRINE/digestion.md"
    package: "src/myco/digestion/"
  germination:
    doc: "docs/architecture/L2_DOCTRINE/genesis.md"
    package: "src/myco/germination/"
  homeostasis:
    doc: "docs/architecture/L2_DOCTRINE/homeostasis.md"
    package: "src/myco/homeostasis/"
  ingestion:
    doc: "docs/architecture/L2_DOCTRINE/ingestion.md"
    package: "src/myco/ingestion/"

commands:
  manifest_ref: "src/myco/surface/manifest.yaml"

metrics:
  test_count: 668

waves:
  current: 10
  log_ref: "docs/contract_changelog.md"
