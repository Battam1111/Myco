system:
  principles_count: 12
  principles_label: 十二原则
  entry_point: MYCO.md
  # --- Upstream Protocol v1.0 (contract version lock) ---
  # Authoritative source: docs/agent_protocol.md §8
  # Craft record:         docs/primordia/upstream_protocol_craft_2026-04-11.md
  # Changelog:             docs/contract_changelog.md
  contract_version: "v0.10.0"  # Wave 11: craft reflex (L15 + hunger signal)
  upstream_scan_last_run: null
  upstream_channels:
    # Path-based classification — strictest-class-wins. An instance agent
    # MUST map any proposed upstream change to one of these classes by path
    # and MUST NOT self-escalate. Class Z is the hardest gate.
    class_x:            # Auto-mergeable (examples / notes / append-only log)
    - log.md
    - notes/**
    - examples/**
    class_y:            # Inline-confirm (docs / wiki prose)
    - wiki/**
    - docs/**           # except docs/agent_protocol.md (see class_z)
    class_z:            # Review-required (contract / lint / templates / canon)
    - docs/agent_protocol.md
    - docs/craft_protocol.md
    - scripts/lint_knowledge.py
    - src/myco/lint.py
    - src/myco/mcp_server.py
    - src/myco/upstream.py    # v0.9.0 — kernel absorb module
    - _canon.yaml
    - src/myco/templates/**
    - forage/_index.yaml      # v1.7.0 — forage manifest is discipline surface

  # --- Upstream Protocol v0.9.0 (absorb impl) ---
  # Debate: docs/primordia/upstream_absorb_craft_2026-04-11.md
  # Kernel side receiving dock: .myco_upstream_inbox/ (L11 dotdir-exempt).
  # CLI verbs:   myco upstream {scan, absorb, ingest}
  # Bundle flow: instance outbox → absorb → kernel inbox → ingest → pointer
  #              note (source: upstream_absorbed) + evidence archive.
  upstream_absorb:
    kernel_inbox_dir: .myco_upstream_inbox
    absorbed_subdir: absorbed
    bundle_filename_pattern: '^n_\d{8}T\d{6}_[0-9a-f]+\.bundle\.(yaml|yml|json)$'
    kernel_bundle_filename_pattern: '^\d{8}T\d{6}_n_\d{8}T\d{6}_[0-9a-f]+\.bundle\.(yaml|yml|json)$'
    pointer_note_source: upstream_absorbed
    batch_ingest_cap: 10       # max bundles per single ingest invocation

  # --- Craft Protocol v1 (W3) ---
  # Authoritative spec:    docs/craft_protocol.md
  # Bound principle:       W3 (docs/WORKFLOW.md)
  # Debate of record:      docs/primordia/craft_formalization_craft_2026-04-11.md
  # Lint of record:        L13 Craft Protocol Schema
  craft_protocol:
    version: 1
    dir: docs/primordia
    # Topic must have >= 2 underscore-separated tokens; optional 4-hex
    # suffix resolves same-day collisions.
    filename_pattern: '^[a-z][a-z0-9]*(_[a-z0-9]+){1,}_craft_\d{4}-\d{2}-\d{2}(_[0-9a-f]{4})?\.md$'
    required_frontmatter:
    - type                    # must equal "craft"
    - status                  # from valid_statuses
    - created                 # ISO date
    - target_confidence       # float in [0,1]
    - current_confidence      # float in [0,1]
    - rounds                  # int >= min_rounds
    - craft_protocol_version  # int; v1 files MUST have this = 1
    - decision_class          # key of confidence_targets_by_class
    valid_statuses:
    - DRAFT                   # writing in progress; < min_rounds completed
    - ACTIVE                  # >= min_rounds; conclusion citable
    - COMPILED                # extracted into permanent location
    - SUPERSEDED              # replaced by newer craft
    - LOCAL                   # gitignored local experiment, excluded from lint
    min_rounds: 2
    confidence_targets_by_class:
      kernel_contract: 0.90   # agent_protocol / lint / canon / templates / mcp_server
      instance_contract: 0.85 # per-project architectural decisions
      exploration: 0.75       # tentative designs / naming / open research
    stale_active_threshold_days: 30
    grandfather_rule: "Files lacking craft_protocol_version are exempt from L13 strict checks."
    # --- Craft Reflex (contract v0.10.0, Wave 11) ---
    # Authoritative debate: docs/primordia/craft_reflex_craft_2026-04-11.md
    # Lint of record:       L15 Craft Reflex
    # Hunger signal:        craft_reflex_missing
    # Problem solved: the discovery surface for craft was passive — trigger
    # conditions (kernel contract change / public-claim rewrite) could fire
    # without the agent ever recalling craft exists. Reflex converts those
    # trigger surfaces into an active check: if a file on a listed surface
    # was touched recently and no craft evidence appears in the same window,
    # a LOW signal is emitted (non-blocking; craft is still a human ritual,
    # we are only refusing silent bypass).
    reflex:
      enabled: true
      lookback_days: 3
      severity: LOW
      trigger_surfaces:
        # Class 1: kernel contract surfaces — touching any of these is a
        # Trigger #1 per craft_protocol.md §3.
        kernel_contract:
        - docs/agent_protocol.md
        - docs/craft_protocol.md
        - _canon.yaml
        - src/myco/lint.py
        - src/myco/mcp_server.py
        - src/myco/templates/_canon.yaml
        - src/myco/templates/MYCO.md
        # Class 2: public-claim surfaces — rewriting any of these is a
        # Trigger #4 (external stakeholder-visible claim). Wave 10 README
        # rewrite walked past craft precisely because this class did not
        # exist yet; its absence is the direct motivating failure.
        public_claim:
        - README.md
        - README_zh.md
        - README_ja.md
        - MYCO.md
        - docs/vision.md
      # Auxiliary evidence pattern scanned in log.md within the same window.
      # Primary detection is file mtime on the surfaces above; this regex
      # is only used to avoid false positives when a surface was touched
      # AS PART OF landing a craft conclusion.
      evidence_pattern: '(docs/primordia/[a-z0-9_]+_craft_\d{4}-\d{2}-\d{2}(_[0-9a-f]{4})?\.md|craft_reference\s*:)'

  # --- Structural Limits (contract v1.5.0) ---
  # Authoritative spec:    docs/biomimetic_map.md §4
  # Debate of record:      docs/primordia/biomimetic_restructure_craft_2026-04-11.md
  # Signal of record:      hunger signal `structural_bloat`
  # Seeded (not adaptive): fixed thresholds; adaptive threshold is future work
  #                        登记在 docs/open_problems.md §4 的压缩工程延伸.
  structural_limits:
    # Soft limit on non-contract top-level docs/*.md files.
    # Contract-level docs listed in exclude_paths are not counted in the
    # denominator, so this counts "pressure from working documents".
    docs_top_level_soft_limit: 20
    # Soft limit on docs/primordia/*.md files. Primordia is expected to
    # churn — crafts are born ACTIVE then transition to COMPILED /
    # SUPERSEDED / LOCAL. Exceeding this limit is a signal that compression
    # (COMPILED → wiki + git history pointer) is overdue.
    primordia_soft_limit: 40
    # Contract-level docs that carry structural authority — these are not
    # "bloat", they are load-bearing rhizomorphs. Excluded from the docs/
    # top-level count.
    exclude_paths:
    - docs/agent_protocol.md
    - docs/craft_protocol.md
    - docs/contract_changelog.md
    - docs/biomimetic_map.md
    - docs/WORKFLOW.md
    - docs/vision.md
    - docs/theory.md
    - docs/architecture.md
    - docs/open_problems.md
    - docs/evolution_engine.md

  wiki_page_types:
  - entity
  - concept
  - operations
  - analysis
  - craft
  evolution_gears: 4
  myco_md_max_lines: 300
  stale_patterns:
  - 五原则
  - 六原则
  - 七原则
  # Note: "v0.8" was in this list as a pre-v1.0 stale tag when Myco was
  # briefly at v0.9.0 → 1.0. Wave 8 pre-release re-baseline restored v0.x
  # as the current family (see docs/contract_changelog.md top banner), so
  # the legacy anti-pattern was removed. If you need to detect future
  # stale version tags, re-add them here by exact substring.
  vision_anchors:
    # Machine-readable identity anchors — any drop below threshold in
    # README.md / README_zh.md / MYCO.md triggers L9 vision-drift alert.
    # Authoritative source: docs/primordia/vision_recovery_craft_2026-04-10.md
    # §7 Machine-Readable Anchor Terms.
    min_hits_per_file: 1
    targets:
    - README.md
    - README_zh.md
    - README_ja.md
    - MYCO.md
    # Each group = one identity element. A file passes the group if ANY
    # variant appears at least min_hits_per_file times. Groups are OR-ed
    # internally, AND-ed across groups.
    groups:
    - name: substrate-identity
      any_of: ["substrate", "基质", "Substrate", "基質"]
    - name: cpu-metaphor
      any_of: ["CPU", "operating system", "OS upgrades", "自升级", "OS ", "自己升級", "自己升级"]
    - name: non-parametric
      any_of: ["non-parametric", "Non-parametric", "非参数", "weights are touched", "weights never", "权重永不", "非参数的", "重みは"]
    - name: metabolism
      any_of: ["metabolism", "metabolize", "Metabolic", "代谢", "消化系统", "代謝", "消化系"]
    - name: seven-step-pipeline
      any_of: ["excrete", "淘汰", "seven-step", "七步", "排出", "七段"]
    - name: compression-doctrine
      any_of: ["Compression", "compression", "压缩", "attention is not", "注意力有限", "圧縮", "注意力は"]
    - name: four-layer-self-model
      any_of: ["self-model", "Self-Model", "四层自我", "Inventory", "库存", "decay", "退化"]
    - name: mutation-selection
      any_of: ["mutation", "selection", "变异", "选择压力", "Mutation", "選択圧", "選擇壓"]
    - name: perpetual-evolution
      any_of: ["Perpetual", "perpetual", "Stagnation", "stagnation", "永恒进化", "停滞即死", "永続", "停滞"]
    - name: transparency-anticancer
      any_of: ["Transparent", "transparent", "透明", "cancerous", "癌变", "癌化"]
    - name: kernel-instance
      any_of: ["kernel", "instance", "内核", "实例", "カーネル", "インスタンス"]
    - name: theoretical-lineage
      any_of: ["Karpathy", "Polanyi", "Argyris", "PDCA", "Voyager", "理论血统", "ポラニー", "アージリス"]
  notes_schema:
    # Digestive substrate — the four-command set (eat / digest / view /
    # hunger) reads and writes notes here. Authoritative design record:
    # docs/primordia/digestive_architecture_craft_2026-04-10.md
    dir: notes
    filename_pattern: '^n_\d{8}T\d{6}_[0-9a-f]{4}\.md$'
    required_fields:
    - id
    - status
    - source
    - tags
    - created
    - last_touched
    - digest_count
    - promote_candidate
    - excrete_reason
    # Optional fields (v1.4.0+) — not enforced by L10, but documented here
    # as SSoT so downstream readers can discover them. See
    # docs/primordia/dead_knowledge_seed_craft_2026-04-11.md.
    optional_fields:
    - view_count              # int, default 0; incremented by `myco view <id>` single-note mode
    - last_viewed_at          # ISO str or null; set by `myco view <id>` single-note mode
    valid_statuses:
    - raw            # just ingested, not yet processed
    - digesting      # being read / summarized / extracted
    - extracted      # key claim lifted into wiki or MYCO.md
    - integrated     # fully merged into canonical structures
    - excreted       # removed from active rotation (must cite reason)
    # Self-Model D layer seed (v1.4.0) — dead knowledge detection.
    # See docs/primordia/dead_knowledge_seed_craft_2026-04-11.md.
    terminal_statuses:       # statuses considered "settled", eligible for dead detection
    - extracted
    - integrated
    dead_knowledge_threshold_days: 30
    valid_sources:
    - chat                # pulled from conversation context
    - eat                 # user/agent invoked `myco eat` explicitly
    - promote             # grown from another note
    - import              # bulk ingested from external tool
    - bootstrap           # created during myco init / first-run scaffolding
    - forage              # v0.7.0 — digested extract from a forage/ item
    - upstream_absorbed   # v0.9.0 — pointer note from myco upstream ingest;
                          # body + evidence file in .myco_upstream_inbox/absorbed/

  # --- Forage Substrate (contract v1.7.0) ---
  # External reference material intake — the exoenzyme / foraging phase
  # of fungal metabolism. Authoritative spec: docs/agent_protocol.md §8.9
  # (inbound channel classification). Debate of record:
  # docs/primordia/forage_substrate_craft_2026-04-11.md (kernel_contract,
  # 2 rounds, 0.92 confidence). Biomimetic mapping:
  # docs/biomimetic_map.md §2 — this is the FIRST directory whose biological
  # name is justified by information gain from day one.
  #
  # Discipline: forage/ is transient. Items enter raw, must be digested
  # into notes/ (producing digest_target), then absorbed once the digest
  # note reaches extracted/integrated, then eventually discarded. No
  # permanent storage — the compression doctrine has teeth here.
  forage_schema:
    dir: forage
    index_file: forage/_index.yaml
    # ID convention — mirrors notes/ pattern (n_…) with f_ prefix.
    filename_pattern: '^f_\d{8}T\d{6}_[0-9a-f]{4}$'
    required_item_fields:
    - id
    - source_url
    - source_type
    - local_path
    - acquired_at
    - status
    - license                # REQUIRED. "unknown" allowed but forces quarantined.
    - size_bytes
    optional_item_fields:
    - license_restrictions   # list of strings, e.g. ["no-redistribute"]
    - license_checked_at     # ISO date, defaults to acquired_at
    - digest_target          # list of note ids produced from this item
    - notes                  # human annotation
    - why                    # intent statement from `myco forage add --why`
    valid_source_types:
    - paper                  # PDF, arxiv, markdown paper
    - repo                   # git clone
    - article                # blog post, HN thread, discussion → .md
    - other                  # catch-all; triggers L14 LOW reminder
    valid_statuses:
    - raw                    # just acquired
    - digesting              # agent actively extracting
    - digested               # note(s) produced, digest_target non-empty
    - absorbed               # digest note(s) reached extracted/integrated
    - discarded              # explicitly removed
    - quarantined            # failed license check / lint, needs review
    # Seeded thresholds — not adaptive. Future work in open_problems §4.
    max_item_size_bytes: 10485760        # 10 MB soft cap per item
    forage_backlog_threshold: 5          # ≥5 raw items triggers hunger
    stale_raw_days: 14                   # raw > 14 days triggers hunger
    total_budget_bytes: 209715200        # 200 MB soft total budget (hunger)
    hard_budget_bytes: 1073741824        # 1 GB hard limit (L14 HIGH)
    license_recheck_days: 90             # stale license reminder threshold

  write_surface:
    # L11 Write-Surface Lint — defines the only legal write targets for
    # any agent operating on this substrate. Anything outside this list
    # (and not covered by .gitignore) is CRITICAL. Authoritative contract:
    # docs/agent_protocol.md §1.
    #
    # Each entry is a path pattern (glob-ish, rooted at project root).
    # Trailing "/" means "this directory and anything under it".
    # "**" means recursive. Files matching an allowed pattern are legal.
    allowed:
    # --- Digestive substrate ---
    - notes/                 # via myco eat / digest ONLY
    - wiki/                  # structured knowledge (agent extract allowed)
    - forage/                # v1.7.0 — external material pre-digestion (see forage_schema)
    - docs/                  # framework docs
    - log.md                 # append-only via myco_log
    - MYCO.md                # L1 index
    - _canon.yaml            # SSoT — human approval in practice
    # --- Code / packaging ---
    - src/                   # package source
    - scripts/               # CLI/lint scripts
    - tests/                 # test suite
    - examples/              # example projects (ASCC etc.)
    - assets/                # images / branding
    - dist/                  # build output (ephemeral; recreated by hatchling)
    # --- Standard repo files ---
    - README.md
    - README_zh.md
    - README_ja.md
    - LICENSE
    - CODE_OF_CONDUCT.md
    - CONTRIBUTING.md
    - SECURITY.md
    - pyproject.toml
    - .gitignore
    - .github/
    - .mcp.json
    # --- Hard-forbidden top-level (even if created, L11 will flag) ---
    forbidden_top_level:
    - scratch.md
    - scratch.txt
    - notes.md
    - TODO.md
    - MEMO.md
    - memo.md
    - ideas.md
    - draft.md
    - summary.md
    - thoughts/
    - my_notes/
    - tmp/
    - temp/

  # --- Quantified Indicators (contract v0.8.0, Wave 8) ---
  # Schema-only. Current values live in MYCO.md "📊 指标面板" section.
  # Authoritative craft: docs/primordia/pre_release_rebaseline_craft_2026-04-11.md
  #
  # Rule: any number in the substrate that expresses progress / confidence /
  # maturity / saturation / pressure MUST live in [0.0, 1.0] and use one of
  # the approved suffixes below. Counts (e.g. principles_count) are exempt.
  # Handwritten bootstrap values MUST be ≤ 0.70 unless backed by an external
  # event (real PyPI release, lint pass, craft confidence, etc).
  indicators:
    range: [0.0, 1.0]
    bootstrap_ceiling_without_evidence: 0.70
    valid_suffixes:
    - _progress        # completion (0 unstarted → 1 fully achieved)
    - _confidence      # belief level (0 total doubt → 1 total trust)
    - _maturity        # stability (0 seedling → 1 release-ready)
    - _saturation      # fullness (0 empty → 1 at budget ceiling)
    - _pressure        # demand signal (0 relaxed → 1 critical)
    rationale_required: true      # every indicator must carry a rationale line
    stale_after_days: 90          # L15 future work will flag stale indicators
    authoritative_value_location: MYCO.md#指标面板
    history_location: log.md       # upward changes must cite wave milestone
    substrate_keys:
    # Canonical list of substrate-level indicator keys. MYCO.md dashboard
    # MUST contain every key in this list. Adding a new key = kernel_contract
    # class craft or higher.
    - v1_launch_progress
    - three_channel_maturity
    - lint_coverage_confidence
    - compression_discipline_maturity
    - identity_anchor_confidence
    - forage_backlog_pressure
    - notes_digestion_pressure
    - upstream_inbox_pressure   # v0.9.0 — pending bundles / ceiling(5);
                                # ceiling is bootstrap, pending friction data.
                                # Debate: docs/primordia/upstream_absorb_craft_2026-04-11.md
    upstream_inbox_ceiling: 5   # count at which pressure saturates to 1.0

architecture:
  layers: 4
  wiki_pages: 0
project:
  name: Myco
  current_phase: Phase 2 — v0.2.0 pre-release, preparing public launch (pre-1.0)
  description: 可自进化的 AI 延伸认知基质框架
  started: '2026-04-09'
package:
  name: myco
  version: 0.2.0
  python_requires: '>=3.8'
  pypi_url: https://pypi.org/project/myco/
  github: Battam1111/Myco
  entry_cli: myco
  build_backend: hatchling
  template_dirs:
  - src/myco/templates/
adapters:
  mempalace: {}
