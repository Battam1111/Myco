# _canon.yaml — Myco self-substrate, v0.6.0 (schema v2).
# Schema: docs/architecture/L1_CONTRACT/canon_schema.md
# Comments in this file are reserved for schema annotations only
# (per canon_schema.md rule 1). Narrative cross-references live under
# `_ref`-suffixed fields, not here.
#
# v0.6.0 (2026-04-28) lands schema v2 (minimal: bool→enum +
# federation_peers field) per the v0.6.0 unified evolution craft.
# See docs/primordia/v0_6_0_unified_evolution_and_thorough_refactor_craft_2026-04-28.md.

schema_version: "2"
contract_version: "v0.6.0"
synced_contract_version: "v0.6.0"
identity:
  substrate_id: "myco-self"
  tags:
    - "myco"
    - "agent-substrate"
    - "python-package"
  entry_point: "MYCO.md"
  # v0.6.0 schema v2 addition. Federation peers are downstream substrates
  # this substrate has agreed to propagate to. Empty list at v0.6.0 — the
  # field is forward-compat infrastructure for L0 P5 mycelium federation
  # planning. See L0_VISION.md:111-129.
  federation_peers: []

system:
  write_surface:
    allowed:
      - "_canon.yaml"
      - "_canon_lint.yaml"
      - "MYCO.md"
      - "CHANGELOG.md"
      - "README.md"
      - "pyproject.toml"
      - "notes/**"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - ".claude/**"
      # v0.4.1 plugin bundle (Stage D.3).
      - ".claude-plugin/**"
      - ".mcp.json"
      - "hooks/**"
      - "skills/**"
      # v0.5.19 Cowork plugin bundle.
      - ".cowork-plugin/**"
      # v0.5.11 MCP Registry onboarding.
      - "server.json"
      - "CITATION.cff"
      # v0.5.13 Dockerfile for OCI introspection.
      - "Dockerfile"
      - ".dockerignore"
      # v0.5.22 Glama registry ownership marker.
      - "glama.json"
      # v0.5.24 runtime state directory.
      - ".myco_state/**"
      # v0.6.0 examples/ for 8 framework demo subtree (LangChain /
      # LangGraph / CrewAI / DSPy / Smolagents / Agno / PraisonAI /
      # MS Agent Framework / Claude Agent SDK).
      - "examples/**"
      # v0.6.0 dist/ for hatch-hook-derived CHANGELOG embedded in sdist.
      - "dist/**"
  hard_contract:
    rules_ref: "docs/architecture/L1_CONTRACT/protocol.md"
    rule_count: 7
  # v0.5.6 → v0.6.0 schema v2: bool → 3-state enum.
  # "forbidden" (default; Myco strict P1 — no LLM in substrate process)
  # "opt-in"   (per-call sampling allowed; tokens cleared after each call)
  # "providers-declared" (substrate also opted into providers/ populated)
  # MP1/MP2/MP3 + CL1/CL2/CL3 dims cooperate to enforce.
  llm_policy: "forbidden"
  # v0.6.0 resource redaction policy: governs what `myco://canon` and
  # `myco://notes/...` resources reveal to MCP hosts. Default protected
  # scope hides federation peers + identity tags + governance state.
  # OAuth scope `canon:full` unlocks the raw view at `myco://canon/raw`.
  resource_redaction:
    paths:
      protected:
        - "identity.federation_peers"
        - "identity.tags"
        - "system.governance"
      private: []
    scopes:
      public: ["contract_version", "schema_version", "subsystems", "lint.categories"]
      protected: ["identity.substrate_id", "system.write_surface", "lint.dimensions"]
      # private requires OAuth scope `canon:full`.
  # v0.6.0 resource subscription budget. Per-substrate watch handle quota
  # to prevent inotify max_user_watches exhaustion in multi-tenant
  # streamable-http deployments. ETag-based long-poll fallback when
  # quota saturates. MB7 dim emits when ≥80% consumed.
  resource_watch:
    max_per_substrate: 100
    eviction: "lru"
    fallback_to_etag_polling: true
  # v0.6.0 governance tiers. Risk-classified craft proposals can land
  # via agent-self-winnow + public window without owner gate.
  # public_window = max(senesce_count >= N, wall_clock_days >= D).
  # owner-veto via vetoed_at on any pending entry is always-on.
  # OAuth refresh token grace window for streamable-http deployments.
  governance:
    public_window_min_senesce_count: 7
    public_window_min_wall_clock_days: 7
    refresh_token_rotation_grace_seconds: 30
    last_winnowed_proposals: []
    # When true, mcp_auth.py must import _redact_in_logs helper.
    # CL2 dim refuses streamable-http server boot otherwise.
    token_redaction_required: true

versioning:
  package_version_ref: "src/myco/__init__.py"
  pyproject_dynamic: true

lint:
  # v0.6.0 owner amendment §A4: lint.dimensions table extracted to
  # sibling _canon_lint.yaml. core.canon.load_canon merges the
  # dimensions_ref payload into the canon's lint section transparently.
  dimensions_ref: "_canon_lint.yaml"
  categories:
    - mechanical
    - shipped
    - metabolic
    - semantic
  dimensions:
    # v0.5.0–v0.5.7 roster (11 dims):
    M1: mechanical
    M2: mechanical
    M3: mechanical
    MB1: metabolic
    MB2: metabolic
    MF1: mechanical
    MF2: mechanical
    MP1: mechanical
    SE1: semantic
    SE2: semantic
    SH1: shipped
    # v0.5.8 additions (14 new dims, Phase 14 of the v0.5.8 cleanup):
    MP2: mechanical
    DC1: mechanical
    DC2: mechanical
    DC3: mechanical
    DC4: mechanical
    CS1: mechanical
    FR1: mechanical
    PA1: mechanical
    CG1: mechanical
    CG2: mechanical
    DI1: mechanical
    MB3: metabolic
    SE3: semantic
    RL1: semantic
    # v0.6.0 additions (17 new dims; severity-promotion ledger applies).
    # Mechanical structural (9 dims, batch A):
    PA2: mechanical    # megafile LoC cap (>800)
    PA3: mechanical    # surface/ pure-adapter import discipline
    PA4: mechanical    # core/ no-cross-subsystem import (allow-listed metaprogramming)
    PA5: mechanical    # meta-subsystem layering (cycle/surface/install/symbionts/mcp not imported by subsystems)
    SC1: mechanical    # canon JSON-Schema vs load_canon parity
    DC5: mechanical    # abstract-parent-allowlist sourced from canon (replaces dc2:158 hardcode)
    MF3: mechanical    # symbiont host-side artifact integrity (sig verification)
    DI2: mechanical    # discipline-hooks content (R1+R2 hook lines present)
    AD1: mechanical    # adapter silent-skip detection (return [] pattern)
    # Semantic + metabolic (5 dims, batch B):
    SE4: semantic      # reciprocal back-link detection (R5 partial mechanical anchor)
    RL2: semantic      # R3 sense-discipline signal (sliding-window risky verb without sense)
    RL3: semantic      # R4 eat-discipline signal (decision keyword hits without eat)
    MB4: metabolic     # sporulated-reabsorbed integrity (distilled→sporulated must reference doctrine)
    MB6: metabolic     # stale DRAFT craft / stale distilled (14d MEDIUM, 30d HIGH auto-winnow-or-excrete)
    # Shipping + capability + plugin (3 dims, batch C):
    SH2: shipped       # contract_version <= __version__ (defense against ahead-of-kernel canon)
    CL1: mechanical    # sampling enabled only when llm_policy != forbidden
    MP3: mechanical    # plugin bytecode-pattern audit (v0.5.6 MP2-bytecode promise)
    # v0.6.0 R-revision additions (from Round 2 craft):
    MB7: metabolic     # resource_watch quota pressure (≥80% consumed)
    CL2: mechanical    # OAuth token-residency policy (mcp_auth.py imports _redact_in_logs when token_redaction_required)
    CL3: mechanical    # mcp_sampling.py calls _clear_token_after_call() when llm_policy=opt-in
    MF4: mechanical    # overlay_verb subsystem validity (declared subsystem must be in canon.subsystems)
  # v0.6.0 owner amendment §A5 — 21 new dims land at declared severity
  # immediately (NO severity-promotion ladder). Per-dim severity is the
  # value declared in each Python class's ``default_severity``.
  # Owner accepted baseline-reset risk; immune-zero is re-anchored to
  # the v0.6.0 surface from first run.
  # v0.6.0 stale-craft thresholds (MB6 governance). Exposed as canon
  # to avoid magic numbers (per craft Round 2 T29 resolution).
  thresholds:
    stale_draft_warn_days: 14
    stale_draft_auto_excrete_days: 30
    stale_distilled_warn_days: 14
    stale_distilled_auto_excrete_days: 30
    pending_dim_status: ["pending"]
  # v0.6.0 abstract parent allowlist (replaces dc2:158 hardcode; DC5 dim).
  abstract_parent_allowlist:
    - "ABC"
    - "Protocol"
    - "TypedDict"
  exit_policy:
    default: "mechanical:critical,shipped:critical,metabolic:never,semantic:never"
  skeleton_downgrade:
    marker: ".myco_state/autoseeded.txt"
    affected_dimensions: []

subsystems:
  # v0.6.0 owner amendment §A1: boundary promoted to canonical 7th
  # subsystem, unifying surface/install/mcp/host_integration outward
  # interface layer. L0:185-186 vocabulary amendment recorded in
  # boundary.md doctrine. New L2 doctrine at L2_DOCTRINE/boundary.md.
  boundary:
    doc: "docs/architecture/L2_DOCTRINE/boundary.md"
    package: "src/myco/boundary/"
  circulation:
    doc: "docs/architecture/L2_DOCTRINE/circulation.md"
    package: "src/myco/circulation/"
  # v0.6.0: cycle promoted from cross-cutting to canonical 6th subsystem,
  # aligning canon.subsystems with L0_VISION.md:183 which already named
  # Cycle as the 6th subsystem. New L2 doctrine at L2_DOCTRINE/cycle.md.
  cycle:
    doc: "docs/architecture/L2_DOCTRINE/cycle.md"
    package: "src/myco/cycle/"
  digestion:
    doc: "docs/architecture/L2_DOCTRINE/digestion.md"
    package: "src/myco/digestion/"
  germination:
    doc: "docs/architecture/L2_DOCTRINE/genesis.md"
    package: "src/myco/germination/"
  homeostasis:
    doc: "docs/architecture/L2_DOCTRINE/homeostasis.md"
    package: "src/myco/homeostasis/"
  ingestion:
    doc: "docs/architecture/L2_DOCTRINE/ingestion.md"
    package: "src/myco/ingestion/"

commands:
  manifest_ref: "src/myco/boundary/surface/manifest.yaml"

metrics:
  test_count: 852

waves:
  current: 21
  log_ref: "docs/contract_changelog.md"
