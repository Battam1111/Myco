name: Auto Release

# Wave 55 (vision_closure_craft_2026-04-14.md §G9):
# Conventional-commit driven semver bump + tag + release.
#
# Workflow:
#   1. On push to main, parse commits since last tag.
#   2. Determine bump level: major (BREAKING:/feat!:), minor (feat:), patch (fix:/docs:/refactor:/chore:).
#   3. Update pyproject.toml + src/myco/__init__.py version string.
#   4. Generate CHANGELOG.md entry from conventional commits.
#   5. Commit bump + tag + push + create GitHub Release (triggers publish.yml).

on:
  push:
    branches: [main]
    paths:
      - 'src/myco/**'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      force_bump:
        description: 'Force bump level (patch|minor|major)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine bump level
        id: bump
        # Conservative policy (2026-04-14): feat: alone only bumps patch —
        # we were churning through minors (0.3.1 -> 0.4.0 -> 0.5.0 in one
        # afternoon). Minor bumps now require an explicit `minor:` prefix
        # OR `MINOR-RELEASE` in the commit body. Major still requires
        # `feat!:` / `BREAKING:`. Use workflow_dispatch force_bump for ad-hoc.
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          BODIES=$(git log ${LAST_TAG}..HEAD --pretty=format:"%B")
          if [ -n "${{ inputs.force_bump }}" ]; then
            LEVEL="${{ inputs.force_bump }}"
          elif echo "$COMMITS" | grep -qE "^(BREAKING:|feat!:)"; then
            LEVEL="major"
          elif echo "$COMMITS" | grep -qE "^minor:" || echo "$BODIES" | grep -q "MINOR-RELEASE"; then
            LEVEL="minor"
          elif echo "$COMMITS" | grep -qE "^(feat:|fix:|docs:|refactor:|perf:|chore:|test:)"; then
            LEVEL="patch"
          else
            LEVEL="none"
          fi
          echo "level=$LEVEL" >> $GITHUB_OUTPUT
          echo "Bump level: $LEVEL"
          # Wave 58 (2026-04-14): warn loudly when a push to main falls
          # through every conventional-commit grep — silent no-release was
          # the root cause of several "why didn't PyPI update?" reports.
          if [ "$LEVEL" = "none" ]; then
            echo "::warning::No conventional-commit prefix matched in commits since $LAST_TAG — auto-release will be skipped. Use 'feat:' / 'fix:' / 'minor:' prefixes to trigger a bump."
          fi

      - name: Compute new version
        if: steps.bump.outputs.level != 'none'
        id: version
        run: |
          python scripts/bump_version.py --level ${{ steps.bump.outputs.level }} --write
          NEW_VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "new=$NEW_VER" >> $GITHUB_OUTPUT

      - name: Generate CHANGELOG entry
        if: steps.bump.outputs.level != 'none'
        run: |
          python scripts/generate_changelog.py --since ${{ steps.bump.outputs.last_tag }} --version ${{ steps.version.outputs.new }}

      - name: Commit, tag, push
        if: steps.bump.outputs.level != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/myco/__init__.py CHANGELOG.md
          git commit -m "chore(release): v${{ steps.version.outputs.new }}"
          # Annotated tag so --follow-tags picks it up; also push tag
          # explicitly so `gh release create` can see it (root cause of
          # v0.4.0 / v0.5.0 release failures, 2026-04-14).
          git tag -a "v${{ steps.version.outputs.new }}" -m "Release v${{ steps.version.outputs.new }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Create GitHub Release
        if: steps.bump.outputs.level != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(python scripts/generate_changelog.py --since ${{ steps.bump.outputs.last_tag }} --version ${{ steps.version.outputs.new }} --stdout)
          gh release create "v${{ steps.version.outputs.new }}" \
            --title "v${{ steps.version.outputs.new }}" \
            --notes "$NOTES"
