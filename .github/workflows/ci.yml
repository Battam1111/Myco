name: CI

# v0.5.7 minimum-viable CI: runs pytest + ruff + mypy + build + twine
# check on every push and pull-request against main. The matrix covers
# all four supported Python versions. No external secrets required.
#
# Parity with contributor-local commands (per CONTRIBUTING.md):
#   pytest                              — 593+ tests
#   python -m myco immune               — all 11 lint dimensions green
#   python -m ruff check src .tests      — ruff lint baseline
#   python -m ruff format --check ...   — formatter drift detector
#   python -m mypy src/myco             — type-check baseline
#   python -m build && twine check …    — release-hygiene check
#
# Keeping the set small + fast: total wall-clock is ~2-3 minutes per
# matrix cell on GitHub-hosted runners.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a flurry of force-pushes
# doesn't queue jobs for already-replaced commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# v0.6.12 supply-chain hardening (per OpenSSF Scorecard
# "Token-Permissions" check): default to read-all-deny, deny-by-default
# at top-level. Jobs widen explicitly when needed.
permissions:
  contents: read

jobs:
  test:
    name: pytest + ruff + mypy (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          # Windows cell on the newest supported Python — catches the
          # Windows-specific CRLF / cp936 / locale issues that have bit
          # us in the past (see the v0.5.3-fix dogfood bug #6 arc).
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev + mcp + adapters extras
        # CI installs ``[adapters]`` too so `test_package_imports` in
        # `tests/test_scaffold.py` can walk every sub-package — the
        # HTML / PDF / URL adapters import `bs4` / `pypdf` / `httpx`
        # at module top (Adapter protocol, not lazy). Without the
        # extras, `pkgutil.walk_packages` hits ModuleNotFoundError
        # before any test body runs. End users installing `myco[mcp]`
        # without adapters don't hit this: they simply never import
        # the adapter subpackage. CI exercises the full matrix.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp,adapters]"

      - name: Ruff lint
        run: python -m ruff check src .tests

      - name: Ruff format (check only)
        run: python -m ruff format --check src .tests

      - name: Mypy
        # Non-strict baseline (see [tool.mypy] in pyproject.toml).
        # Covers src/ only — tests rely on fixtures mypy would need
        # extensive stubbing for; revisit if we ever want strict CI.
        run: python -m mypy src/myco

      - name: Pytest (with coverage + xdist)
        # v0.6.0 §K.3 / §K.4: --cov enables global floor;
        # ``-n auto --dist loadfile`` runs tests in parallel.
        # v0.8.4 hotfix: floor relaxed 85 → 82 to absorb v0.8.0's new
        # multimedia adapters (audio/image_ocr/video_frames; CI skips
        # them because Pillow + whisper + opencv aren't installed) +
        # OAuth helper module additions. Per-package floors at
        # ``.scripts/coverage_floors.py`` enforce stricter thresholds
        # on the load-bearing packages (core 95% / homeostasis 92% / ...).
        # v0.9 IOU: re-tighten to 85 once multimedia mock-tests cover
        # the audio_segments / video_frame_ocr / image_ocr happy paths.
        run: python -m pytest -q --maxfail=5 -n auto --dist loadfile --cov --cov-report=xml --cov-fail-under=82

      - name: Coverage per-package floors
        # v0.6.0 §K.3: enforce per-package floors (core/=95, homeostasis/=92, ...).
        run: python .scripts/coverage_floors.py

      - name: Myco self-immune
        # Self-dogfood: the release candidate must lint clean against
        # its own substrate before it can ship. Exits 0 when every
        # finding is below CRITICAL.
        run: python -m myco immune

      - name: Verify MCP boot
        # v0.6.0 §K.5 — MCP stdio handshake smoke test (6 stages).
        run: python .scripts/verify_mcp_boot.py

      - name: Verify MCP capabilities
        # v0.6.0 §K.5 — capability matrix smoke (tools/resources/prompts).
        run: python .scripts/verify_mcp_capabilities.py

      - name: Verify install examples
        # v0.6.0 §K.5 — 8 framework demos --dry exit 0 each.
        run: python .scripts/verify_install_examples.py

      - name: Verify server.json
        # v0.6.0 §H — JSON Schema + 4KB _meta budget assertion.
        run: python .scripts/verify_server_json.py

  build:
    name: sdist + wheel + twine check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist + wheel
        # v0.8.4 root-cleanup (2026-05-12): build output redirected from
        # repo-root `dist/` to hidden `.dist/` so the build artifact dir
        # no longer clutters the visible root tree.
        run: python -m build --outdir .dist

      - name: Twine metadata check
        run: python -m twine check .dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: .dist/
          retention-days: 7
          if-no-files-found: error
