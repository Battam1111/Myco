name: Auto-revert (auto-craft veto handler)

# Auto-revert workflow — Myco v0.6.14+
#
# Closes the autopoietic loop's owner-veto path. When an auto-craft PR
# (branch prefix `fruiting/`) is closed without merge, this workflow:
#
#   1. Deletes the auto-craft branch (no commit reaches main; git revert
#      is not needed because nothing was merged in the first place — the
#      PR's commits live only on the branch).
#   2. Posts a `vetoed_intent` comment on the substrate-wide auto-evolve
#      tracking issue. The next `myco senesce` (in any session) reads
#      these comments via gh CLI and writes `vetoed_at: <ISO timestamp>`
#      into matching `_canon.yaml::system.governance.last_winnowed_proposals[]`
#      entries (see src/myco/cycle/senesce.py::_reap_vetoed_intents).
#
# Why issue-comment instead of direct canon write: GitHub Actions and
# concurrent local pushes to main can race on _canon.yaml. The issue
# comment is a write-once / read-many consensus point that senesce
# reaps idempotently, avoiding the race.
#
# Governing doctrine: docs/architecture/L2_DOCTRINE/cycle.md § "Cycle
# 自起 fruit—winnow—molt 闭环 (v0.6.14+)" + boundary.md § "Sixth seam".
# Governing craft: docs/primordia/v0_6_14_cycle_autostart_fruit_winnow_molt_loop_craft_2026-04-29.md.

on:
  pull_request:
    types: [closed]

# Default permissions: deny-by-default; the job widens explicitly.
permissions:
  contents: read

# Cancel in-flight reverts on the same PR — only the latest close event matters.
concurrency:
  group: auto-revert-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  revert:
    name: Delete branch + post vetoed_intent
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only fire when:
    #   1. PR was closed without merge (merged: false).
    #   2. Head branch is in the fruiting/ namespace (auto-craft).
    if: |
      github.event.pull_request.merged == false &&
      startsWith(github.event.pull_request.head.ref, 'fruiting/')
    permissions:
      # Required to delete the branch.
      contents: write
      # Required to post the vetoed_intent comment on the tracking issue.
      issues: write
      # Required to read the closing PR's metadata.
      pull-requests: read
    steps:
      - name: Resolve auto-evolve tracking issue ID from canon
        id: tracking
        run: |
          set -euo pipefail
          # Read _canon.yaml::system.governance.auto_evolve_tracking_issue_id
          # via raw curl + grep. Avoids needing python in this lightweight job.
          CANON_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/_canon.yaml"
          ISSUE_ID=$(curl -fsSL "$CANON_URL" | grep -E "^\s*auto_evolve_tracking_issue_id:" | sed -E 's/.*:\s*//' | tr -d '"' | tr -d "'" | tr -d ' ')
          if [ -z "$ISSUE_ID" ] || [ "$ISSUE_ID" = "null" ] || [ "$ISSUE_ID" = "~" ]; then
            echo "::warning::auto_evolve_tracking_issue_id is null in canon; cannot post vetoed_intent. Run .scripts/seed_auto_evolve_tracking_issue.py to seed."
            echo "issue_id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved tracking issue ID: $ISSUE_ID"

      - name: Delete the auto-craft branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          echo "Deleting branch: $BRANCH_REF"
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$BRANCH_REF" || {
            echo "::warning::Failed to delete branch $BRANCH_REF — may already be gone or protected."
          }

      - name: Post vetoed_intent comment to tracking issue
        if: steps.tracking.outputs.issue_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_ID: ${{ steps.tracking.outputs.issue_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_CLOSED_AT: ${{ github.event.pull_request.closed_at }}
        run: |
          set -euo pipefail
          # Extract slug from branch ref `fruiting/<slug>-<YYYY-MM-DD>`.
          SLUG=$(echo "$PR_HEAD_REF" | sed -E 's|^fruiting/(.+)-[0-9]{4}-[0-9]{2}-[0-9]{2}$|\1|')

          # Compose the vetoed_intent JSON blob. Single-line JSON inside a
          # markdown code block so senesce can parse with a simple regex.
          BODY=$(cat <<EOF
          **vetoed_intent** (auto-revert.yml on PR #$PR_NUMBER closed-without-merge)

          \`\`\`json
          {"slug": "$SLUG", "pr_number": $PR_NUMBER, "pr_title": "${PR_TITLE//\"/\\\"}", "branch": "$PR_HEAD_REF", "closed_at": "$PR_CLOSED_AT", "reason": "owner-closed-without-merge"}
          \`\`\`

          Branch \`$PR_HEAD_REF\` deleted. Next \`myco senesce\` will reap this comment and write \`vetoed_at\` to \`canon.governance.last_winnowed_proposals[]\` entry matching slug.
          EOF
          )

          gh issue comment "$ISSUE_ID" --repo "${{ github.repository }}" --body "$BODY"
          echo "Posted vetoed_intent for slug=$SLUG to issue #$ISSUE_ID"
