name: Release

# v0.5.13 release automation. Fires on any `v*` tag push and
# synchronises the four release channels that every Myco version
# must hit to stay consistent:
#
#   1. Build  — sdist + wheel, twine metadata check.
#   2. PyPI   — upload via trusted publisher (no token in secrets).
#   3. MCP Registry — mcp-publisher login github-oidc → publish.
#                     Reads server.json at the tagged commit, so
#                     version + mcp-name sentinel must already be
#                     in sync (enforced by the tag-verify step).
#   4. GitHub release — auto-create from contract_changelog.md's
#                       section for this tag, falling back to
#                       --generate-notes if no matching section
#                       exists. Idempotent: skips if already created.
#
# Pre-flight safety:
#   - Verifies GITHUB_REF tag matches `src/myco/__init__.py` AND
#     `server.json::version` AND `server.json::packages[0].version`.
#     Any mismatch fails the job before anything is published —
#     preventing the "PyPI 0.5.12, registry 0.5.11" class of drift.
#
# One-time setup the user must do in a browser (see CONTRIBUTING
# "Release automation"):
#   - PyPI trusted publisher: https://pypi.org/manage/project/myco/
#     → "Publishing" → add Battam1111/Myco, workflow=release.yml,
#     environment leave blank. Once this is saved, PyPI upload via
#     OIDC works with no repo secret.
#   - MCP Registry OIDC: automatic — the registry trusts any
#     GitHub Actions OIDC token whose repo matches `Battam1111/*`
#     for the `io.github.Battam1111/*` namespace. No UI config.
#
# Manual fallback: if trusted publisher isn't configured, set a
# `PYPI_API_TOKEN` secret on the repo and uncomment the `with:
# password:` line on the publish step.

on:
  push:
    tags: ["v*"]

# Releases shouldn't be cancelled mid-flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish to PyPI + MCP Registry + GitHub release
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # PyPI trusted publisher + MCP Registry OIDC
      contents: write   # gh release create

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify tag matches version in every file
        # Catches the "committed 0.5.12 but tagged 0.5.13" class of
        # bug before anything touches PyPI or the MCP Registry.
        run: |
          set -eo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          # v0.6.0: PEP 440 post-release strategy. PyPI burned the
          # myco-0.6.0 wheel filename, so __version__ wears a ``.postN``
          # suffix to dodge the burn while the canonical release tag,
          # server card, plugin manifests, and citation file remain at
          # the bare ``0.6.0``. Compute BASE = TAG with any .postN tail
          # stripped so the cross-file parity check still works.
          BASE=$(echo "$TAG" | sed -E 's/\.post[0-9]+$//')
          PKG=$(python -c "import re; print(re.search(r'__version__ = \"([^\"]+)\"', open('src/myco/__init__.py').read()).group(1))")
          SRV=$(python -c "import json; print(json.load(open('server.json'))['version'])")
          # server.json::packages[] may be empty when distribution is
          # routed through GitHub Release / OCI rather than declared
          # registry slots. Fall back to server.json::version in that case.
          SRV_PKG=$(python -c "import json; d=json.load(open('server.json')); print(d['packages'][0]['version'] if d['packages'] else d['version'])")
          PLUGIN=$(python -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          COWORK=$(python -c "import json; print(json.load(open('.cowork-plugin/.claude-plugin/plugin.json'))['version'])")
          echo "tag:                                       v$TAG"
          echo "tag base (post-release suffix stripped):   v$BASE"
          echo "src/myco/__init__.py:                      $PKG"
          echo "server.json::version:                      $SRV"
          echo "server.json::packages[0]:                  $SRV_PKG"
          echo ".claude-plugin/plugin.json:                $PLUGIN"
          echo ".cowork-plugin/.claude-plugin/plugin.json: $COWORK"
          # __version__ MUST match the full tag (including any .postN).
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG ≠ __version__ $PKG"; exit 1; }
          # All other SSoT slots match the BASE version (post-release
          # suffix stripped), since post-release is a PyPI-only artifact-
          # naming workaround, not a user-facing version bump.
          [ "$BASE" = "$SRV"     ] || { echo "::error::tag base v$BASE ≠ server.json version $SRV"; exit 1; }
          [ "$BASE" = "$SRV_PKG" ] || { echo "::error::tag base v$BASE ≠ server.json packages[0].version $SRV_PKG"; exit 1; }
          [ "$BASE" = "$PLUGIN"  ] || { echo "::error::tag base v$BASE ≠ plugin.json version $PLUGIN"; exit 1; }
          [ "$BASE" = "$COWORK"  ] || { echo "::error::tag base v$BASE ≠ cowork-plugin version $COWORK"; exit 1; }

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI (trusted publisher)
        # v0.6.0 PyPI strategy (PEP 440 post-release): the bare
        # myco-0.6.0 wheel name was burned by an earlier experimental
        # release-pipeline run; PyPI permanently forbids re-uploading
        # deleted filenames. Owner-approved fix (path B): publish the
        # PyPI artifact under ``__version__ = "0.6.0.post1"`` so the
        # wheel filename ``myco-0.6.0.post1-py3-none-any.whl`` is fresh
        # and the burn is dodged. The canonical release stays at
        # v0.6.0 in every user-facing surface (server.json, plugin.json,
        # CITATION.cff, git tag base). Per PEP 440 §post-releases,
        # "0.6.0.post1" is not a version increment — it is "the same
        # 0.6.0 release re-issued under a fresh artifact name".
        # ``skip-existing: true`` covers the idempotent re-tag case
        # (re-running this same release on the same post-release name).
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Build Cowork .plugin bundle
        # v0.5.20: produce the drag-drop bundle Cowork users upload
        # via Claude Desktop → Settings → Plugins → Upload. Only the
        # GitHub release asset needs it — PyPI and MCP Registry would
        # both choke on it as an "unknown distribution format", so we
        # build it AFTER the PyPI publish step and write it alongside
        # the sdist+wheel (dist/) for the `gh release upload` step
        # below to pick up.
        #
        # We install pyyaml explicitly because scripts/build_plugin.py
        # imports ``myco.boundary.install.plugin_bundle``, which goes through
        # ``myco/install/__init__.py`` → ``myco/core/__init__.py`` →
        # ``yaml``. The ``python -m build`` step above only populates
        # the wheel, not the CI Python's site-packages, so ``yaml``
        # isn't yet on path. The alternative would be
        # ``pip install dist/*.whl`` but that pulls the full transitive
        # closure for a 10-line script — wasteful on the hot path.
        run: |
          set -eo pipefail
          python -m pip install pyyaml
          python scripts/build_plugin.py
          ls -lh dist/*.plugin

      - name: Install mcp-publisher
        run: |
          set -eo pipefail
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo install -m 0755 mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --help | head -4

      - name: Publish to MCP Registry via GitHub OIDC
        run: |
          set -eo pipefail
          mcp-publisher login github-oidc
          mcp-publisher publish

      - name: Create GitHub release (idempotent)
        # Prefers the contract_changelog.md section for this tag
        # (which `myco molt` writes) as the release body, falling
        # back to GitHub's auto-generated commit-scraping notes.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "GitHub release $TAG already exists — skipping."
            exit 0
          fi
          # Extract "## $TAG —" ... up to (but not including) the next "---"
          SECTION=$(awk "/^## $TAG /{flag=1} flag; /^---$/{if(flag){flag=0; exit}}" docs/contract_changelog.md \
                    | sed '$d' || true)
          if [ -n "$SECTION" ]; then
            echo "Using contract_changelog.md $TAG section as release body."
            printf '%s\n' "$SECTION" > /tmp/release_notes.md
            gh release create "$TAG" --title "$TAG" --notes-file /tmp/release_notes.md
          else
            echo "No contract_changelog.md section for $TAG — using --generate-notes."
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

      - name: Attach .plugin bundle to GitHub release
        # v0.5.20: the Cowork plugin drag-drop artifact. Upload as a
        # release asset so users can
        # ``curl -L -o myco.plugin \
        #     https://github.com/Battam1111/Myco/releases/latest/download/myco-<ver>.plugin``
        # and drag it into Claude Desktop's plugin upload UI. This is
        # the only persistent install path for Cowork — filesystem
        # writes to rpm/ get clobbered by Anthropic's cloud sync.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          BUNDLE=$(ls dist/*.plugin | head -1)
          if [ -z "$BUNDLE" ] || [ ! -f "$BUNDLE" ]; then
            echo "::error::no .plugin file found in dist/ — did 'Build Cowork .plugin bundle' run?"
            exit 1
          fi
          # Idempotent: --clobber replaces an existing asset with the
          # same name (matters when a release is re-run after a
          # failure mid-upload).
          gh release upload "$TAG" "$BUNDLE" --clobber
          echo "Uploaded $BUNDLE to release $TAG."
