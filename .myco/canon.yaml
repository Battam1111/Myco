# _canon.yaml — Myco self-substrate, v0.7.5 (schema v3).
# Schema: docs/architecture/L1_CONTRACT/canon_schema.md
# Comments in this file are reserved for schema annotations only
# (per canon_schema.md rule 1). Narrative cross-references live under
# `_ref`-suffixed fields, not here.
#
# v0.6.0 (2026-04-28) lands schema v2 (minimal: bool→enum +
# federation_peers field) per the v0.6.0 unified evolution craft.
# v0.7.5 (2026-05-10) lands schema v3 (additive: metrics.lint_dim_count
# field) per the v0.7.5 omnibus craft. See
# docs/primordia/v0_7_5_p0_to_p6_omnibus_craft_2026-05-10.md and
# docs/migration/v0_7_4_to_v0_7_5.md.

schema_version: "3"
contract_version: "v0.8.6"
synced_contract_version: "v0.8.6"
identity:
  substrate_id: "myco-self"
  tags:
    - "myco"
    - "agent-substrate"
    - "python-package"
  # v0.8.4 root-cleanup (2026-05-12): MYCO.md moved to .myco/MYCO.md
  # so the repo root no longer carries the Myco-specific agent entry
  # page as a visible top-level file. canon.entry_point is the SSoT
  # for the path; every code path that needs the entry page reads
  # this field (no hardcoded "MYCO.md" in src/myco/ — verified). For
  # downstream substrates that retain MYCO.md at root, the template
  # default (germination/templates/canon.yaml.tmpl) still emits
  # "MYCO.md" so their canon overrides this path on germinate.
  entry_point: ".myco/MYCO.md"
  # v0.6.0 schema v2 addition. Federation peers are downstream substrates
  # this substrate has agreed to propagate to. Empty list at v0.6.0 — the
  # field is forward-compat infrastructure for L0 P5 mycelium federation
  # planning. See L0_VISION.md:111-129.
  #
  # v0.8.0 (2026-05-11) wires the FIRST production federation peer:
  # `cc-debug` substrate at C:/Users/10350/Desktop/CC, owner-germinated as
  # the v0.8.0 omnibus item A. The path is owner-machine-specific
  # (Windows absolute path); downstream operators who clone myco-self for
  # their own substrate use should clear this list and write their own
  # peers — propagate verb does not require federation_peers to match
  # production-runtime peer paths; the field is declarative metadata,
  # not the propagate call's argument source.
  federation_peers:
    - "C:/Users/10350/Desktop/CC"

system:
  # v0.8.4 root-cleanup (2026-05-12): Myco-self relocates the substrate
  # notes tree from root-level `notes/` to `.myco/notes/` so the repo
  # root no longer carries Myco-internal "data" as a visible folder.
  # SubstratePaths.notes reads this field; default ("notes") is unchanged
  # for downstream substrates that haven't opted into the new layout.
  notes_dir: ".myco/notes"
  # v0.8.4 root-cleanup (2026-05-12): docs tree relocated from root-level
  # `docs/` to `.docs/`. SubstratePaths.docs reads this field; default
  # ("docs") is unchanged for downstream substrates.
  docs_dir: ".docs"
  write_surface:
    # v0.8.4 root-cleanup (2026-05-12): write surface collapsed to the
    # minimal coverage globs. Every Myco-internal/build/registry path
    # lives under a single hidden parent dir, so the allowlist is short
    # and overlap-free. README.md / LICENSE / pyproject.toml are the
    # only un-namespaced root files. CHANGELOG.md is a hatch-derived
    # build artifact under .dist/; the literal entry is retained for
    # the molt verb which may stage a top-level CHANGELOG during
    # release ceremony.
    allowed:
      - "README.md"
      - "pyproject.toml"
      - "CHANGELOG.md"
      - "src/**"
      - ".tests/**"
      - ".scripts/**"
      - ".docs/**"
      - ".myco/**"          # canon + canon_lint + MYCO + notes + state
      - ".plugin/**"        # plugin-bundle siblings of .claude-plugin/
      - ".claude/**"
      - ".claude-plugin/**"
      - ".cowork-plugin/**"
      - ".github/**"
      - ".docker/**"        # Dockerfile + .dockerignore
      - ".meta/**"          # server.json + glama.json
      - ".dist/**"          # build output
  hard_contract:
    rules_ref: ".docs/architecture/L1_CONTRACT/protocol.md"
    rule_count: 7
  # v0.5.6 → v0.6.0 schema v2: bool → 3-state enum.
  # v0.6.14 (option C of T17): enum reduced to 2 values; "providers-declared"
  # dropped because src/myco/providers/ was excreted (never populated through
  # 7 minor releases, v0.5.6 → v0.6.13). Future provider coupling, if ever
  # needed, requires its own L0 P1 amendment craft + fresh contract-bumping
  # molt — NOT a pre-baked escape hatch sitting empty for years. See
  # docs/architecture/L2_DOCTRINE/boundary.md § "Future axis" (historical note).
  # "forbidden" (default; Myco strict P1 — no LLM in substrate process)
  # "opt-in"   (per-call sampling allowed; tokens cleared after each call)
  # MP1/MP2/MP3 + CL1/CL2/CL3 dims cooperate to enforce.
  llm_policy: "forbidden"
  # v0.6.0 resource redaction policy: governs what `myco://canon` and
  # `myco://notes/...` resources reveal to MCP hosts. Default protected
  # scope hides federation peers + identity tags + governance state.
  # OAuth scope `canon:full` unlocks the raw view at `myco://canon/raw`.
  resource_redaction:
    paths:
      protected:
        - "identity.federation_peers"
        - "identity.tags"
        - "system.governance"
      private: []
    scopes:
      public: ["contract_version", "schema_version", "subsystems", "lint.categories"]
      protected: ["identity.substrate_id", "system.write_surface", "lint.dimensions"]
      # private requires OAuth scope `canon:full`.
  # v0.6.0 resource subscription budget. Per-substrate watch handle quota
  # to prevent inotify max_user_watches exhaustion in multi-tenant
  # streamable-http deployments. ETag-based long-poll fallback when
  # quota saturates. MB7 dim emits when ≥80% consumed.
  resource_watch:
    max_per_substrate: 100
    eviction: "lru"
    fallback_to_etag_polling: true
  # v0.6.0 governance tiers. Risk-classified craft proposals can land
  # via agent-self-winnow + public window without owner gate.
  # public_window = max(senesce_count >= N, wall_clock_days >= D).
  # owner-veto via vetoed_at on any pending entry is always-on.
  # OAuth refresh token grace window for streamable-http deployments.
  governance:
    public_window_min_senesce_count: 7
    public_window_min_wall_clock_days: 7
    refresh_token_rotation_grace_seconds: 30
    last_winnowed_proposals: []
    # When true, mcp_auth.py must import _redact_in_logs helper.
    # CL2 dim refuses streamable-http server boot otherwise.
    # v0.8.0 gap §4 closure: build_server now also calls
    # configure_logging_redaction(...) on the uvicorn / mcp / starlette
    # loggers when this flag is true, so the redaction filter is
    # actually attached to the running server (not just imported).
    token_redaction_required: true
    # v0.8.0 gap §2/§3 closure: OAuth 2.1 + RFC 8707 streamable-HTTP
    # discovery surface. When ``oauth.issuer_url`` is non-empty,
    # build_server constructs a MycoOAuthProvider, instantiates a
    # TokenVerifier, and passes auth=AuthSettings(...) into FastMCP —
    # the streamable-HTTP transport then auto-mounts the Bearer auth
    # middleware. Empty / unset issuer_url = OAuth disabled (default;
    # backward compat with v0.7.x: no auth, every request accepted).
    # Env vars MYCO_OAUTH_ISSUER_URL / MYCO_OAUTH_AUDIENCE override
    # canon (env wins). See src/myco/boundary/surface/mcp_auth.py for
    # the full provider docstring.
    oauth:
      issuer_url: ""
      audience: "myco"
      jwks_url: ""
    # v0.6.14 Cycle 自起 fruit—winnow—molt 闭环 (governance fields).
    # See L2_DOCTRINE/cycle.md § "Cycle 自起 闭环 (v0.6.14+)" + governing
    # craft v0_6_14_cycle_autostart_fruit_winnow_molt_loop_craft_2026-04-29.
    # Master switch (default false; opt-in per substrate).
    auto_propose_enabled: false
    # Rate limit: minimum wall-clock between two auto-evolve invocations.
    # Persisted in .myco/state/last_auto_evolve.txt; cross-process visible.
    auto_evolve_min_wall_clock_seconds_between: 600
    # Number of fungal-named critics primordium spawns in autonomous mode.
    # v0.6.14: 3 (mycoparasite + saprotroph + mycorrhiza, ad-hoc roles).
    # v0.6.15+: 5, derived from L0 P1-P5 (one critic per principle):
    #   chytrid (P1) + rhizomorph (P2) + mycoparasite (P3) +
    #   saprotroph (P4) + mycorrhiza (P5). See craft
    #   v0_6_15_agent_first_default_for_cycle_autostart_loop_craft_2026-04-29.md
    #   Round 1.5 endophyte T7 for the rationale; future critic additions
    #   require naming an L0 principle.
    auto_evolve_critic_count: 5
    # Branch prefix for auto-craft PRs (fungal taxonomy per L0:185-186).
    # "fruiting/" = fruiting body in mycology. NOT "auto-craft/".
    auto_evolve_branch_prefix: "fruiting/"
    # Same-distilled-hash cooldown: prevents feedback loops where
    # auto-craft modifies doctrine then re-triggers from same distilled.
    auto_evolve_distilled_hash_cooldown_senesce: 7
    # v0.6.14: shipped as `true` (forced every auto-craft to high-risk +
    # owner-gate); inverted L0 P1 ("Only For Agent") into Owner-First.
    # v0.6.15: flipped to `false`. Risk class is now derived from craft
    # CONTENT via core.risk_classifier (path_allowlist-based superset of
    # v0.6.0 keywords + recursion-cutter for any craft modifying the
    # classifier itself or governance.auto_evolve_* keys).
    # See craft v0_6_15_agent_first_default_for_cycle_autostart_loop.
    auto_evolve_force_high_risk: false
    # v0.6.14: shipped as `true` (bypassed 7-session/7-day public window,
    # making PR-merge the sole gate); same L0 P1 inversion as above.
    # v0.6.15: flipped to `false`. Medium-risk auto-crafts now use
    # the v0.6.0 governance public window like any other craft.
    auto_evolve_pr_window_skip: false
    # Distilled-note severity threshold; LOW distilled does not trigger.
    # Values: low / medium / high / critical (matches Severity enum).
    auto_evolve_min_distilled_severity: medium
    # Daily budget cap for auto-evolve runs (USD-equivalent of agent
    # cost). null = unbounded; owner sets a cap. Spend tracked in
    # .myco/state/auto_evolve_spend.json.
    auto_evolve_daily_budget_usd: null
    # GitHub issue number where vetoed_intent comments are posted by
    # auto_revert.yml. Seeded once via scripts/seed_auto_evolve_tracking_issue.py
    # null until seeded; then int.
    auto_evolve_tracking_issue_id: null
    # Hosts permitted to author crafts (MP1 dim host-signature check).
    # Crafts in docs/primordia/*.md MUST carry `authored_by:` frontmatter
    # naming one of these hosts; otherwise MP1 emits HIGH finding.
    # `human` covers hand-authored crafts; `claude-code-agent` covers
    # primordium-driven autonomous crafts; the others reserve namespace
    # for future host integrations (cursor / claude-desktop / cowork).
    recognized_authoring_hosts:
      - "claude-code-agent"
      - "cursor-agent"
      - "claude-desktop-agent"
      - "cowork-agent"
      - "human"
    # v0.7.2 永恒删减 ratchet (MB8 dim — shim sunset gate):
    # A back-compat shim is safe to delete only if its hit-counter
    # reports zero hits across BOTH the senesce-cycle window AND the
    # wall-clock window below (whichever is later). Defaults derived
    # from the v0.7.1 incident: 4 versions of stderr DeprecationWarning
    # was insufficient signal; we want at least 7 senesce cycles +
    # 7 days of confirmed silence before the agent can propose
    # removal autonomously.
    shim_sunset_min_zero_cycles: 7
    shim_sunset_min_zero_days: 7

versioning:
  package_version_ref: "src/myco/__init__.py"
  pyproject_dynamic: true

lint:
  # v0.6.0 owner amendment §A4: lint.dimensions table extracted to
  # sibling _canon_lint.yaml. core.canon.load_canon merges the
  # dimensions_ref payload into the canon's lint section transparently.
  # v0.8.4 root-cleanup (2026-05-12): the dim table moved from repo-root
  # `_canon_lint.yaml` into `.myco/canon_lint.yaml` so the repo root no
  # longer carries Myco-internal lint config as a visible file. The
  # dimensions_ref pointer below is the canonical SSoT; load_canon
  # resolves it relative to the canon file's parent directory.
  dimensions_ref: ".myco/canon_lint.yaml"
  categories:
    - mechanical
    - shipped
    - metabolic
    - semantic
  # v0.6.10 (option A): inline `dimensions:` table removed. The live
  # 47-dim roster (v0.8.6) lives in sibling `canon_lint.yaml` (referenced
  # via `dimensions_ref` above). `core.canon._merge_lint_dimensions_subfile`
  # transparently merges the sibling at load time. Single SSoT.
  # v0.6.0 owner amendment §A5 — 21 new dims land at declared severity
  # immediately (NO severity-promotion ladder). Per-dim severity is the
  # value declared in each Python class's ``default_severity``.
  # Owner accepted baseline-reset risk; immune-zero is re-anchored to
  # the v0.6.0 surface from first run.
  # v0.6.0 stale-craft thresholds (MB6 governance). Exposed as canon
  # to avoid magic numbers (per craft Round 2 T29 resolution).
  thresholds:
    stale_draft_warn_days: 14
    stale_draft_auto_excrete_days: 30
    stale_distilled_warn_days: 14
    stale_distilled_auto_excrete_days: 30
    pending_dim_status: ["pending"]
  # v0.6.0 abstract parent allowlist (replaces dc2:158 hardcode; DC5 dim).
  abstract_parent_allowlist:
    - "ABC"
    - "Protocol"
    - "TypedDict"
  exit_policy:
    default: "mechanical:critical,shipped:critical,metabolic:never,semantic:never"
  skeleton_downgrade:
    marker: ".myco/state/autoseeded.txt"
    affected_dimensions: []

subsystems:
  # v0.6.0 owner amendment §A1: boundary promoted to canonical 7th
  # subsystem, unifying surface/install/mcp/host_integration outward
  # interface layer. L0:185-186 vocabulary amendment recorded in
  # boundary.md doctrine. New L2 doctrine at L2_DOCTRINE/boundary.md.
  boundary:
    doc: ".docs/architecture/L2_DOCTRINE/boundary.md"
    package: "src/myco/boundary/"
  circulation:
    doc: ".docs/architecture/L2_DOCTRINE/circulation.md"
    package: "src/myco/circulation/"
  # v0.6.0: cycle promoted from cross-cutting to canonical 6th subsystem,
  # aligning canon.subsystems with L0_VISION.md:183 which already named
  # Cycle as the 6th subsystem. New L2 doctrine at L2_DOCTRINE/cycle.md.
  cycle:
    doc: ".docs/architecture/L2_DOCTRINE/cycle.md"
    package: "src/myco/cycle/"
  digestion:
    doc: ".docs/architecture/L2_DOCTRINE/digestion.md"
    package: "src/myco/digestion/"
  germination:
    doc: ".docs/architecture/L2_DOCTRINE/genesis.md"
    package: "src/myco/germination/"
  homeostasis:
    doc: ".docs/architecture/L2_DOCTRINE/homeostasis.md"
    package: "src/myco/homeostasis/"
  ingestion:
    doc: ".docs/architecture/L2_DOCTRINE/ingestion.md"
    package: "src/myco/ingestion/"

commands:
  manifest_ref: "src/myco/boundary/surface/manifest.yaml"

metrics:
  test_count: 1609
  lint_dim_count: 47
  # v0.7.2 永恒删减 ratchet (PA6 dim — repo bloat detector):
  # MEDIUM finding emitted at ≥80% of threshold; HIGH at ≥100%. The
  # threshold is intentionally generous — the ratchet exists to catch
  # the v0.7.0-style "11 MB legacy_v0_3 hidden 4 fail-silent dims"
  # accumulation, not to police normal substrate growth. Resolution
  # is agent-autonomous via myco excrete (raw notes) or fruit→molt
  # (doctrine archival); never owner-merge-gated (chytrid T3 / L0 P1).
  repo_size_max_bytes: 52428800  # 50 MB
  # Substrate-level paths NOT counted against repo_size_max_bytes.
  # Protects L0 P2 (永恒吞噬): the substrate's own ingestion targets
  # (notes/) and immutable history (_landed/, _archive/) are never
  # the substrate's own bloat-cause.
  repo_size_excluded:
    - "notes/**"
    - ".docs/primordia/_landed/**"
    - ".docs/_archive/**"
    - ".docs/contract_changelog/_archive/**"

waves:
  current: 42
  log_ref: ".docs/contract_changelog.md"
